      flex: 1;
    }

    .rep-tier-name {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 0.15rem;
    }

    .rep-tier-desc {
      font-size: 0.8rem;
      color: var(--text-secondary);
      line-height: 1.4;
    }

    .rep-tier-req {
      font-size: 0.7rem;
      color: var(--accent-teal);
      margin-top: 0.25rem;
      font-weight: 600;
    }

    .rep-tier-badge {
      font-size: 0.7rem;
      padding: 0.25rem 0.75rem;
      border-radius: 20px;
      font-weight: 700;
      white-space: nowrap;
    }

    .rep-tier-badge.unlocked {
      background: rgba(0,217,163,0.15);
      color: var(--success-green);
    }

    .rep-tier-badge.current {
      background: rgba(255,215,0,0.15);
      color: var(--accent-gold);
    }

    .rep-tier-badge.locked {
      background: rgba(176,176,184,0.1);
      color: var(--text-secondary);
    }

    .rep-info-box {
      background: rgba(0,217,255,0.06);
      border: 1px solid rgba(0,217,255,0.2);
      border-radius: 10px;
      padding: 1rem 1.25rem;
      font-size: 0.85rem;
      color: var(--text-secondary);
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }

    .rep-info-box strong {
      color: var(--accent-teal);
    }

    .rep-unlock-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }

    .rep-unlock-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      font-size: 0.85rem;
    }

    .rep-unlock-item.earned {
      border-color: rgba(0,217,163,0.3);
    }

    .rep-unlock-item.pending {
      opacity: 0.5;
    }

    .rep-gated-overlay {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      padding: 1.25rem;
      text-align: center;
      margin-bottom: 1rem;
    }

    .rep-gated-overlay .lock-icon {
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }

    .rep-gated-overlay .lock-text {
      font-size: 0.9rem;
      color: var(--text-secondary);
      margin-bottom: 0.75rem;
    }

    .rep-gated-overlay .lock-action {
      font-size: 0.8rem;
      color: var(--accent-teal);
      cursor: pointer;
      font-weight: 600;
    }

    .rep-badge-inline {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.15rem 0.5rem;
      border-radius: 20px;
      font-size: 0.65rem;
      font-weight: 700;
      margin-left: 0.5rem;
    }

    @media (max-width: 768px) {
      .rep-stats-row {
        grid-template-columns: repeat(2, 1fr);

        return () => clearTimeout(timer);
      }, [onClose]);

      return (
        <div className={`toast ${type}`}>
          {message}

      );

    // ===== AUTH PROVIDER =====
    function AuthProvider({ children }) {
      const [currentUser, setCurrentUser] = useState(null);
      const [profile, setProfile] = useState(null);
      const [loading, setLoading] = useState(true);
      const [toast, setToast] = useState(null);

      // Initialize auth state on mount
      useEffect(() => {
        const initAuth = async () => {
          try {
            const { data: { session } } = await supabase.auth.getSession();
            if (session?.user) {
              setCurrentUser(session.user);
              await fetchProfile(session.user.id);
            }
          } catch (error) {
            console.error('Auth init error:', error);
          } finally {
            setLoading(false);
          }
        };

        initAuth();

        // Listen for auth changes
        const { data: { subscription } } = supabase.auth.onAuthStateChange(async (event, session) => {
          if (session?.user) {
            setCurrentUser(session.user);
            await fetchProfile(session.user.id);
          } else {
            setCurrentUser(null);
            setProfile(null);
          }
        });

        return () => subscription?.unsubscribe();
      }, []);

      const fetchProfile = async (userId) => {
        try {
          const { data, error } = await supabase
            .from('profiles')
            .select('*')
            .eq('id', userId)
            .single();

          if (error) throw error;
          setProfile(data);
        } catch (error) {
          console.error('Profile fetch error:', error);
        }
      };

      const signup = async (displayName, email, password, role) => {
        try {
          const { data, error } = await supabase.auth.signUp({
            email,
            password,
            options: {
              data: {
                display_name: displayName,
                role,
              },
            },
          });

          if (error) throw error;
          showToast('Account created! Please check your email to confirm.', 'success');
          return true;
        } catch (error) {
          showToast(error.message, 'error');
          return false;
        }
      };

      const login = async (email, password) => {
        try {
          const { data, error } = await supabase.auth.signInWithPassword({
            email,
            password,
          });

          if (error) throw error;
          showToast('Logged in successfully!', 'success');
          return true;
        } catch (error) {
          showToast(error.message, 'error');
          return false;
        }
      };

      const logout = async () => {
        try {
          const { error } = await supabase.auth.signOut();
          if (error) throw error;
          setCurrentUser(null);
          setProfile(null);
          showToast('Logged out successfully!', 'success');
        } catch (error) {
          showToast(error.message, 'error');
        }
      };

      const updateProfile = async (updates) => {
        try {
          const { error } = await supabase
            .from('profiles')
            .update(updates)
            .eq('id', currentUser.id);

          if (error) throw error;
          setProfile(prev => ({ ...prev, ...updates }));
          showToast('Profile updated successfully!', 'success');
          return true;
        } catch (error) {
          showToast(error.message, 'error');
          return false;
        }
      };

      const sendMessage = async (conversationId, content) => {
        try {
          const { error } = await supabase
            .from('messages')
            .insert({
              conversation_id: conversationId,
              sender_id: currentUser.id,
              content,
            });

          if (error) throw error;
          return true;
        } catch (error) {
          showToast(error.message, 'error');
          return false;
        }
      };

      const createConversation = async (participant2Id) => {
        try {
          // Check if conversation exists
          const { data: existing } = await supabase
            .from('conversations')
            .select('id')
            .or(`and(participant_1.eq.${currentUser.id},participant_2.eq.${participant2Id}),and(participant_1.eq.${participant2Id},participant_2.eq.${currentUser.id})`)
            .limit(1);

          if (existing && existing.length > 0) {
            return existing[0].id;
          }

          // Create new conversation
          const { data, error } = await supabase
            .from('conversations')
            .insert({
              participant_1: currentUser.id,
              participant_2: participant2Id,
            })
            .select()
            .single();

          if (error) throw error;
          return data.id;
        } catch (error) {
          showToast(error.message, 'error');
          return null;
        }
      };

      const createBooking = async (modelId, sessionDate, durationHours, outfitDescription, contractType, rate) => {
        try {
          const { error } = await supabase
            .from('bookings')
            .insert({
              client_id: currentUser.id,
              model_id: modelId,
              session_date: sessionDate,
              duration_hours: durationHours,

          showToast('Booking request sent!', 'success');
          return true;
        } catch (error) {
          showToast(error.message, 'error');
          return false;
        }
      };

      const updateBooking = async (bookingId, status) => {
        try {
          const { error } = await supabase
            .from('bookings')
            .update({ status })
            .eq('id', bookingId);

          if (error) throw error;
          showToast('Booking updated!', 'success');
          return true;

          showToast(error.message, 'error');
          return false;

      };

          if (error) throw error;

          showToast('Upgraded to Premium!', 'success');
          return true;
        } catch (error) {
          showToast(error.message, 'error');
          return false;
        }
      };

      const showToast = (message, type) => {
        setToast({ message, type });
      };

      const contextValue = {
        currentUser,
        profile,
        loading,
        signup,
        login,
        logout,
        updateProfile,
        sendMessage,
        createConversation,
        createBooking,
        updateBooking,
        upgradeToPremium,
        showToast,
      };

      return (
        <AuthContext.Provider value={contextValue}>
          {children}
          {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
        </AuthContext.Provider>
      );
    }

    // ===== 360 OUTFIT VIEWER (Lazy-loaded, zero dependencies) =====
    function OutfitViewer360({ outfits }) {
      const [activeOutfit, setActiveOutfit] = useState(null);
      const [currentAngle, setCurrentAngle] = useState(0);
      const [isDragging, setIsDragging] = useState(false);
      const dragStartX = React.useRef(0);
      const startAngle = React.useRef(0);

      if (!outfits || outfits.length === 0) return null;

      const angleLabels = ['Front', 'Front-Right', 'Right', 'Back-Right', 'Back', 'Back-Left', 'Left', 'Front-Left'];

      const handlePointerDown = (e) => {
        setIsDragging(true);
        dragStartX.current = e.clientX || e.touches?.[0]?.clientX || 0;
        startAngle.current = currentAngle;
        e.preventDefault();
      };

      const handlePointerMove = (e) => {
        if (!isDragging || !activeOutfit) return;
        const clientX = e.clientX || e.touches?.[0]?.clientX || 0;
        const diff = clientX - dragStartX.current;
        const totalAngles = activeOutfit.angles.length;
        const sensitivity = 60; // pixels per angle step
        const angleShift = Math.round(diff / sensitivity);
        let newAngle = (startAngle.current + angleShift) % totalAngles;
        if (newAngle < 0) newAngle += totalAngles;
        setCurrentAngle(newAngle);
      };

      const handlePointerUp = () => {
        setIsDragging(false);
      };

      const openViewer = (outfit) => {
        setActiveOutfit(outfit);
        setCurrentAngle(0);
      };

      return (
        <div className="viewer360-section">
          <div className="viewer360-grid">
            {outfits.map((outfit, i) => (
              <div key={i} className="viewer360-card" onClick={() => openViewer(outfit)}>
                <div className="viewer360-card-preview">
                  {outfit.angles[0]}
                  <div className="viewer360-badge">🔄 360°</div>
                </div>
                <div className="viewer360-card-label">{outfit.name}</div>
              </div>
            ))}
          </div>

          {activeOutfit && (
            <div className="viewer360-overlay"
              onMouseMove={handlePointerMove}
              onMouseUp={handlePointerUp}
              onMouseLeave={handlePointerUp}
              onTouchMove={handlePointerMove}
              onTouchEnd={handlePointerUp}>
              <button className="viewer360-close" onClick={() => setActiveOutfit(null)}>✕</button>
              <div className="viewer360-stage"
                onMouseDown={handlePointerDown}
                onTouchStart={handlePointerDown}>
                <span style={{ transition: 'transform 0.15s ease', transform: isDragging ? 'scale(1.05)' : 'scale(1)' }}>
                  {activeOutfit.angles[currentAngle]}
                </span>
                <div className="viewer360-angle-label">
                  {angleLabels[currentAngle] || `Angle ${currentAngle + 1}`} • {currentAngle + 1}/{activeOutfit.angles.length}
                </div>

    function MessagesPage({ conversationId }) {
      const auth = useContext(AuthContext);
      const [conversations, setConversations] = useState([]);
      const [messages, setMessages] = useState([]);
      const [selectedConvId, setSelectedConvId] = useState(conversationId);
      const [newMessage, setNewMessage] = useState('');
      const [loading, setLoading] = useState(true);
      const messageEndRef = useRef(null);

      const scrollToBottom = () => {
        messageEndRef.current?.scrollIntoView({ behavior: 'smooth' });
      };

      useEffect(() => {
        scrollToBottom();
      }, [messages]);

      useEffect(() => {
        const fetchConversations = async () => {
          try {
            const { data, error } = await supabase
              .from('conversations')
              .select('*')
              .or(`participant_1.eq.${auth.currentUser.id},participant_2.eq.${auth.currentUser.id}`)
              .order('last_message_at', { ascending: false });

            if (error) throw error;
            setConversations(data || []);
          } catch (error) {
            console.error('Fetch conversations error:', error);
          } finally {
            setLoading(false);
          }
        };

        if (auth.currentUser) {
          fetchConversations();
        }
      }, [auth.currentUser]);

      useEffect(() => {
        const fetchMessages = async () => {
          if (!selectedConvId) return;

          try {
            const { data, error } = await supabase
              .from('messages')
              .select('*')
              .eq('conversation_id', selectedConvId)
              .order('created_at', { ascending: true });

            if (error) throw error;
            setMessages(data || []);
          } catch (error) {
            console.error('Fetch messages error:', error);
          }
        };

        fetchMessages();

        // Subscribe to realtime messages
        const subscription = supabase
          .channel(`messages:${selectedConvId}`)
          .on(
            'postgres_changes',
            {
              event: 'INSERT',
              schema: 'public',
              table: 'messages',
              filter: `conversation_id=eq.${selectedConvId}`,
            },
            (payload) => {
              setMessages(prev => [...prev, payload.new]);
            }
          )
          .subscribe();

        return () => {
          subscription.unsubscribe();
        };
      }, [selectedConvId]);

      const handleSendMessage = async () => {
        if (newMessage.trim() && selectedConvId) {
          const success = await auth.sendMessage(selectedConvId, newMessage);
          if (success) {
            setNewMessage('');
            // Update conversation's last_message_at
            await supabase
              .from('conversations')
              .update({
                last_message_at: new Date().toISOString(),
                last_message_preview: newMessage.substring(0, 50),
              })
              .eq('id', selectedConvId);
          }
        }
      };

      if (loading) {
        return <div className="text-center" style={{ padding: '2rem' }}>Loading messages...</div>;
      }

      if (conversations.length === 0) {
        return (
          <div>
            <h2 style={{ marginBottom: '1.5rem' }}>Messages</h2>
            <div className="empty-state">
              <div className="empty-state-icon">💬</div>
              <div className="empty-state-title">No conversations yet</div>
              <div className="empty-state-text">Browse models and start messaging</div>
            </div>
          </div>
        );
      }

      const currentConversation = conversations.find(c => c.id === selectedConvId);

      if (!currentConversation) {
        return (
          <div>
            <h2 style={{ marginBottom: '1.5rem' }}>Messages</h2>
            <div className="empty-state">
              <div className="empty-state-icon">💬</div>
              <div className="empty-state-title">Select a conversation</div>
            </div>
          </div>
        );
      }

      return (
        <div>
          <h2 style={{ marginBottom: '1.5rem' }}>Messages</h2>
          <div className="messages-container">
            <div className="conversations-list">
              <div className="conversations-list-header">Conversations</div>
              <div className="conversations-list-scroll">
                {conversations.map(conv => (
                  <div
                    key={conv.id}
                    className={`conversation-item ${selectedConvId === conv.id ? 'active' : ''}`}
                    onClick={() => setSelectedConvId(conv.id)}
                  >
                    <div className="conversation-name">
                      {conv.participant_1 === auth.currentUser.id ? 'Model' : 'Client'}
                    </div>
                    <div className="conversation-preview">{conv.last_message_preview || 'No messages yet'}</div>
                  </div>
                ))}
              </div>
            </div>

            <div className="message-thread">
              <div className="message-thread-header">Conversation</div>
              <div className="message-thread-scroll">
                {messages.length === 0 ? (
                  <div className="empty-state">
                    <div className="empty-state-icon">👋</div>
                    <div className="empty-state-title">No messages yet</div>
                    <div className="empty-state-text">Start the conversation!</div>
                  </div>
                ) : (
                  <>
                    {messages.map(msg => (
                      <div key={msg.id} className={`message-bubble ${msg.sender_id === auth.currentUser.id ? 'sent' : 'received'}`}>
                        <div className="message-content">{msg.content}</div>
                        <div className="message-time">
                          {new Date(msg.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}
                        </div>
                      </div>
                    ))}
                    <div ref={messageEndRef} />
                  </>
                )}
              </div>
              <div className="message-input-section">
                <input
                  type="text"
                  placeholder="Type your message..."
                  value={newMessage}
                  onChange={(e) => setNewMessage(e.target.value)}
                  onKeyPress={(e) => e.key === 'Enter' && handleSendMessage()}
                />
                <button onClick={handleSendMessage}>Send</button>
              </div>
            </div>
          </div>
        </div>
      );
    }

      const auth = useContext(AuthContext);
      const [bookings, setBookings] = useState([]);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        const fetchBookings = async () => {
          try {
            let query = supabase.from('bookings').select('*');

            if (auth.profile?.role === 'model') {
              query = query.eq('model_id', auth.currentUser.id);
            } else {
              query = query.eq('client_id', auth.currentUser.id);
            }

            const { data, error } = await query.order('created_at', { ascending: false });

            if (error) throw error;
            setBookings(data || []);

            setLoading(false);
          }
        };

        if (auth.currentUser && auth.profile) {
          fetchBookings();
        }
      }, [auth.currentUser, auth.profile]);

    // ===== REPUTATION LEVEL HELPER =====
    function getClientRepLevel(sessions, trustScore) {
      if (sessions >= 25 && trustScore >= 90) return { level: 5, name: 'Platinum Elite', icon: '💎', color: '#b388ff', next: null, sessionsNeeded: 0, trustNeeded: 0 };
      if (sessions >= 15 && trustScore >= 85) return { level: 4, name: 'Gold VIP', icon: '👑', color: '#ffd700', next: 'Platinum Elite', sessionsNeeded: 25 - sessions, trustNeeded: Math.max(0, 90 - trustScore) };
      if (sessions >= 10 && trustScore >= 80) return { level: 3, name: 'Silver Pro', icon: '🥈', color: '#c0c0c0', next: 'Gold VIP', sessionsNeeded: 15 - sessions, trustNeeded: Math.max(0, 85 - trustScore) };
      if (sessions >= 3 && trustScore >= 70) return { level: 2, name: 'Bronze Member', icon: '🥉', color: '#cd7f32', next: 'Silver Pro', sessionsNeeded: 10 - sessions, trustNeeded: Math.max(0, 80 - trustScore) };
      return { level: 1, name: 'Newcomer', icon: '🌱', color: '#66bb6a', next: 'Bronze Member', sessionsNeeded: 3 - sessions, trustNeeded: Math.max(0, 70 - trustScore) };
    }

    // ===== MAIN APP COMPONENT =====
    function App() {
      const auth = useContext(AuthContext);
      const [currentPage, setCurrentPage] = useState('home');

      useEffect(() => {
        const handleHashChange = () => {
          const hash = window.location.hash.slice(1) || 'home';
          setCurrentPage(hash);
        };
        window.addEventListener('hashchange', handleHashChange);
        handleHashChange();
        return () => window.removeEventListener('hashchange', handleHashChange);
      }, []);

      if (auth.loading) {
        return (
          <div className="app-container">
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', minHeight: '100vh' }}>
              <div className="loading-spinner"></div>
            </div>
          </div>
        );
      }

      const renderPage = () => {
        const [page, ...params] = currentPage.split('/');

        if (page === 'home') return !auth.currentUser ? <HomePage /> : <FeedPage />;
        if (page === 'feed') return <FeedPage />;
        if (page === 'wall') return <TopClientsPage />;
        if (page === 'invest') return <TokenMarketPage />;
        if (page === 'reputation') return <ReputationPage />;
        if (page === 'token' && params[0]) return <ModelTokenPage modelId={params[0]} />;
        if (page === 'circle' && params[0]) return <InnerCirclePage modelId={params[0]} />;
        if (page === 'browse') return <BrowseModelsPage />;
        if (page === 'profile' && params[0]) return <ProfilePage modelId={params[0]} />;
        if (page === 'client' && params[0]) return <ClientProfilePage clientId={params[0]} />;
        if (page === 'formodels') return <ForModelsPage />;
        if (page === 'westackr') return <WeStackrPage />;
        if (page === 'contracts') return <ContractsPage />;
        if (page === 'login') return <LoginPage />;
        if (page === 'signup') return <SignupPage />;
        if (page === 'dashboard') return auth.currentUser ? <DashboardPage /> : <LoginPage />;
        if (page === 'messages' && params[0]) return auth.currentUser ? <MessagesPage conversationId={params[0]} /> : <LoginPage />;
        if (page === 'messages') return auth.currentUser ? <MessagesPage conversationId={null} /> : <LoginPage />;
        if (page === 'edit-profile') return auth.currentUser ? <EditProfilePage /> : <LoginPage />;
        return !auth.currentUser ? <HomePage /> : <BrowseModelsPage />;
      };

      return (
        <div className="app-container">
          <nav className="nav">
            <div className="nav-brand" onClick={() => window.location.hash = 'home'}>🎀 ModelBid</div>

            <div className="nav-links">
              <a className="nav-link" onClick={() => window.location.hash = 'feed'}>Feed</a>
              <a className="nav-link" onClick={() => window.location.hash = 'browse'}>Browse</a>
              <a className="nav-link" onClick={() => window.location.hash = 'wall'}>🏆 The Wall</a>
              <a className="nav-link" onClick={() => window.location.hash = 'invest'}>📈 Invest</a>
              <a className="nav-link" onClick={() => window.location.hash = 'reputation'}>🛡️ Reputation</a>
              <a className="nav-link" onClick={() => window.location.hash = 'westackr'}>⚡ WeStackr</a>
              <a className="nav-link" onClick={() => window.location.hash = 'contracts'}>Contracts</a>
              <a className="nav-link" onClick={() => window.location.hash = 'formodels'}>For Models</a>
            </div>

            <div className="nav-links">
              {!auth.currentUser ? (
                <>
                  <button className="btn btn-secondary" onClick={() => window.location.hash = 'login'}>Login</button>
                  <button className="btn glow-btn" onClick={() => window.location.hash = 'signup'}>Sign Up</button>
                </>
              ) : (
                <div className="user-section">
                  <a className="nav-link" onClick={() => window.location.hash = 'messages'}>📬 Messages</a>
                  <a className="nav-link" onClick={() => window.location.hash = 'dashboard'}>Dashboard</a>
                  <a className="nav-link" onClick={() => window.location.hash = 'edit-profile'}>⚙️ Profile</a>
                  <div className="user-info">
                    <div className="avatar">{auth.profile?.avatar_emoji || '👤'}</div>
                    <div className="user-name">{auth.profile?.display_name || 'User'}</div>
                  </div>
                  <button className="btn btn-secondary" onClick={async () => {
                    await auth.logout();
                    window.location.hash = 'home';
                  }}>Logout</button>
                </div>
              )}
            </div>
          </nav>

          <div className="main-content">
            {renderPage()}
          </div>
        </div>
      );
    }

    // ===== RENDER APP =====
    ReactDOM.createRoot(document.getElementById('root')).render(
      <AuthProvider>
        <App />
      </AuthProvider>
    );
  </script>
</body>
</html>
