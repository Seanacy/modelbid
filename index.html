            const { data: { session } } = await supabase.auth.getSession();
            if (session?.user) {
              setCurrentUser(session.user);
              await fetchProfile(session.user.id);
            }
          } catch (error) {
            console.error('Auth init error:', error);
          } finally {
            setLoading(false);
            clearTimeout(authTimeout);
          }
        };

        initAuth();

        // Handle return from Stripe checkout
        const hash = window.location.hash;
        if (hash.includes('checkout=success')) {
          // Give Stripe webhook a moment to update the profile, then re-fetch
          setTimeout(async () => {
            const { data: { session } } = await supabase.auth.getSession();
            if (session?.user) {
              await fetchProfile(session.user.id);
              showToast('Payment successful! Your account has been upgraded.', 'success');
            }
          }, 2000);
          // Clean up the URL
          window.location.hash = hash.replace(/[?&]checkout=success(&product=[^&]*)?/, '');
        } else if (hash.includes('checkout=cancel')) {
          showToast('Checkout cancelled.', 'error');
          window.location.hash = hash.replace(/[?&]checkout=cancel/, '');
        }

        // Listen for auth changes
        const { data: { subscription } } = supabase.auth.onAuthStateChange(async (event, session) => {
          if (session?.user) {
            setCurrentUser(session.user);
            await fetchProfile(session.user.id);
          } else {
            setCurrentUser(null);
            setProfile(null);
          }
        });

        return () => { subscription?.unsubscribe(); clearTimeout(authTimeout); };
      }, []);

      const fetchProfile = async (userId) => {
        try {
          const timeoutPromise = new Promise((_, reject) =>
            setTimeout(() => reject(new Error('Profile fetch timeout')), 8000)
          );
          const fetchPromise = supabase
            .from('profiles')
            .select('*')
            .eq('id', userId)
            .single();

          const { data, error } = await Promise.race([fetchPromise, timeoutPromise]);

          if (error) throw error;
          setProfile(data);
        } catch (error) {
          console.error('Profile fetch error:', error);
          // Set a minimal profile using auth metadata as fallback
          const { data: { user } } = await supabase.auth.getUser();
          const fallbackName = user?.user_metadata?.display_name || user?.email?.split('@')[0] || '';
          setProfile({ id: userId, display_name: fallbackName, role: 'model' });
        }
      };

      const signup = async (displayName, email, password, role) => {
        try {
          const { data, error } = await supabase.auth.signUp({
            email,
            password,
            options: {
              data: {
                display_name: displayName,
                role,
              },
            },
          });

          if (error) throw error;
          showToast('Account created! Please check your email to confirm.', 'success');
          return true;
        } catch (error) {
          showToast(error.message, 'error');
          return false;
        }
      };

      const login = async (email, password) => {
        try {
          const { data, error } = await supabase.auth.signInWithPassword({
            email,
            password,
          });

          if (error) throw error;
          showToast('Logged in successfully!', 'success');
          return true;
        } catch (error) {
          showToast(error.message, 'error');
          return false;
        }
      };

      const signInWithGoogle = async () => {
        try {
          const { data, error } = await supabase.auth.signInWithOAuth({
            provider: 'google',
            options: {
              redirectTo: window.location.origin + window.location.pathname + '#dashboard',
            },
          });
          if (error) throw error;
        } catch (error) {
          showToast(error.message, 'error');
        }
      };

      const logout = async () => {
        try {
          const { error } = await supabase.auth.signOut();
          if (error) throw error;
          setCurrentUser(null);
          setProfile(null);
          showToast('Logged out successfully!', 'success');
        } catch (error) {
          showToast(error.message, 'error');
        }
      };

      const updateProfile = async (updates) => {
        try {
          const { error } = await supabase
            .from('profiles')
            .update(updates)
            .eq('id', currentUser.id);

          if (error) throw error;
          setProfile(prev => ({ ...prev, ...updates }));
          showToast('Profile updated successfully!', 'success');
          return true;
        } catch (error) {
          showToast(error.message, 'error');
          return false;
        }
      };

      const sendMessage = async (conversationId, content) => {
        try {
          const { error } = await supabase
            .from('messages')
            .insert({
              conversation_id: conversationId,
              sender_id: currentUser.id,
              content,
            });

          if (error) throw error;
          return true;
        } catch (error) {
          showToast(error.message, 'error');
          return false;
        }
      };

      const createConversation = async (participant2Id) => {
        try {
          // Check if conversation exists
          const { data: existing } = await supabase
            .from('conversations')
            .select('id')
            .or(`and(participant_1.eq.${currentUser.id},participant_2.eq.${participant2Id}),and(participant_1.eq.${participant2Id},participant_2.eq.${currentUser.id})`)
            .limit(1);

          if (existing && existing.length > 0) {
            return existing[0].id;
          }

          // Create new conversation
          const { data, error } = await supabase
            .from('conversations')
            .insert({
              participant_1: currentUser.id,
              participant_2: participant2Id,
            })
            .select()
            .single();

          if (error) throw error;
          return data.id;
        } catch (error) {
          showToast(error.message, 'error');
          return null;
        }
      };

      const createBooking = async (modelId, sessionDate, durationHours, outfitDescription, contractType, rate) => {
        try {
          const { error } = await supabase
            .from('bookings')
            .insert({
              client_id: currentUser.id,
              model_id: modelId,
              session_date: sessionDate,
              duration_hours: durationHours,
              outfit_description: outfitDescription,
              contract_type: contractType,
              rate,
            });

          if (error) throw error;
          showToast('Booking request sent!', 'success');
          return true;
        } catch (error) {
          showToast(error.message, 'error');
          return false;
        }
      };

      const updateBooking = async (bookingId, status) => {
        try {
          const { error } = await supabase
            .from('bookings')
            .update({ status })
            .eq('id', bookingId);

          if (error) throw error;
          showToast('Booking updated!', 'success');
          return true;
        } catch (error) {
          showToast(error.message, 'error');
          return false;
        }
      };

      const upgradeToPremium = async () => {
        try {
          // Determine which Stripe product based on user role
          const product = profile?.role === 'model' ? 'model_premium' : 'client_access';
          showToast('Redirecting to checkout...', 'success');
          await redirectToCheckout(product);
          return true;
        } catch (error) {
          showToast(error.message, 'error');
          return false;
        }
      };

      const subscribeToCherryPicker = async () => {
        try {
          showToast('Redirecting to checkout...', 'success');
          await redirectToCheckout('cherry_picker');
          return true;
        } catch (error) {
          showToast(error.message, 'error');
          return false;
        }
      };

      const showToast = (message, type) => {
        setToast({ message, type });
      };

      const contextValue = {
        currentUser,
        profile,
        loading,
        signup,
        login,
        signInWithGoogle,
        logout,
        updateProfile,
        sendMessage,
        createConversation,
        createBooking,
        updateBooking,
        upgradeToPremium,
        subscribeToCherryPicker,
        showToast,
      };

      return (
        <AuthContext.Provider value={contextValue}>
          {children}
          {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
        </AuthContext.Provider>
      );
    }

      const models = [

        { id: 'tot3', name: 'Mika Rose', rate: '$200', style: 'Cosplay', state: 'TX', img: 'https://images.unsplash.com/photo-1524504388940-b1c1722653e1?w=400&h=500&fit=crop' },
        { id: 'tot4', name: 'Jade Monroe', rate: '$350', style: 'Pin-Up', state: 'MN', img: 'https://images.unsplash.com/photo-1488426862026-3ee34a7d66df?w=400&h=500&fit=crop' },

        { id: 'tot6', name: 'Elara Bliss', rate: '$240', style: 'Glamour', state: 'MN', img: 'https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=400&h=500&fit=crop' },
        { id: 'tot7', name: 'Raven Knight', rate: '$300', style: 'Editorial', state: 'NY', img: 'https://images.unsplash.com/photo-1531746020798-e6953c6e8e04?w=400&h=500&fit=crop' },

      ];

      const handlePick = (side) => {
        if (picked) return;
        setPicked(side);
        setTotalPicks(prev => prev + 1);
        const pickedModel = side === 'left' ? models[leftIdx] : models[rightIdx];
        // Track wins
        setWinCounts(prev => ({ ...prev, [pickedModel.id]: (prev[pickedModel.id] || 0) + 1 }));
        // Show follow prompt after pick
        setTimeout(() => {
          setShowFollowPrompt(pickedModel);
        }, 400);
      };

      const nextRound = (didFollow) => {
        setShowFollowPrompt(null);
        setPicked(null);
        // Winner stays, new challenger comes in
        const winnerIdx = picked === 'left' ? leftIdx : rightIdx;
        const usedIdxs = [leftIdx, rightIdx];
        // Pick a random new model not currently shown
        let available = models.map((_, i) => i).filter(i => !usedIdxs.includes(i));
        if (available.length === 0) available = models.map((_, i) => i).filter(i => i !== winnerIdx);
        const newIdx = available[Math.floor(Math.random() * available.length)];

        if (picked === 'left') {
          setRightIdx(newIdx);
        } else {
          setLeftIdx(newIdx);

        setRound(prev => prev + 1);

      const handleFollow = async (model, advanceRound = true) => {

        if (auth?.profile?.id) {

            await supabase.from('follows').insert({ follower_id: auth.profile.id, following_id: model.id }).select();
          } catch (err) { /* demo models won't have real IDs, that's fine */ }
        }
        if (advanceRound) nextRound(true);
      };

      const handlePass = (side) => {
        const passedModel = side === 'left' ? models[leftIdx] : models[rightIdx];
        const survivorModel = side === 'left' ? models[rightIdx] : models[leftIdx];
        // Track the pass
        setPassCounts(prev => ({ ...prev, [passedModel.id]: (prev[passedModel.id] || 0) + 1 }));
        // Track that survivor was seen and survived
        setSeenCounts(prev => ({
          ...prev,
          [passedModel.id]: (prev[passedModel.id] || 0) + 1,

              )}
            </div>
          </div>

          {/* Follow prompt after pick */}
          {showFollowPrompt && (

    // ===== 360 OUTFIT VIEWER (Lazy-loaded, zero dependencies) =====
    function OutfitViewer360({ outfits }) {
      const [activeOutfit, setActiveOutfit] = useState(null);
      const [currentAngle, setCurrentAngle] = useState(0);
      const [isDragging, setIsDragging] = useState(false);
      const dragStartX = React.useRef(0);
      const startAngle = React.useRef(0);

      if (!outfits || outfits.length === 0) return null;

      const angleLabels = ['Front', 'Front-Right', 'Right', 'Back-Right', 'Back', 'Back-Left', 'Left', 'Front-Left'];

      const handlePointerDown = (e) => {
        setIsDragging(true);
        dragStartX.current = e.clientX || e.touches?.[0]?.clientX || 0;
        startAngle.current = currentAngle;
        e.preventDefault();
      };

      const handlePointerMove = (e) => {
        if (!isDragging || !activeOutfit) return;
        const clientX = e.clientX || e.touches?.[0]?.clientX || 0;
        const diff = clientX - dragStartX.current;
        const totalAngles = activeOutfit.angles.length;
        const sensitivity = 60; // pixels per angle step
        const angleShift = Math.round(diff / sensitivity);
        let newAngle = (startAngle.current + angleShift) % totalAngles;
        if (newAngle < 0) newAngle += totalAngles;
        setCurrentAngle(newAngle);
      };

      const handlePointerUp = () => {
        setIsDragging(false);
      };

      const openViewer = (outfit) => {
        setActiveOutfit(outfit);
        setCurrentAngle(0);
      };

      return (
        <div className="viewer360-section">
          <div className="viewer360-grid">
            {outfits.map((outfit, i) => (
              <div key={i} className="viewer360-card" onClick={() => openViewer(outfit)}>
                <div className="viewer360-card-preview">
                  {outfit.angles[0]}
                  <div className="viewer360-badge">🔄 360°</div>
                </div>
                <div className="viewer360-card-label">{outfit.name}</div>
              </div>
            ))}
          </div>

          {activeOutfit && (
            <div className="viewer360-overlay"
              onMouseMove={handlePointerMove}
              onMouseUp={handlePointerUp}
              onMouseLeave={handlePointerUp}
              onTouchMove={handlePointerMove}
              onTouchEnd={handlePointerUp}>
              <button className="viewer360-close" onClick={() => setActiveOutfit(null)}>✕</button>
              <div className="viewer360-stage"
                onMouseDown={handlePointerDown}
                onTouchStart={handlePointerDown}>
                <span style={{ transition: 'transform 0.15s ease', transform: isDragging ? 'scale(1.05)' : 'scale(1)' }}>
                  {activeOutfit.angles[currentAngle]}
                </span>
                <div className="viewer360-angle-label">
                  {angleLabels[currentAngle] || `Angle ${currentAngle + 1}`} • {currentAngle + 1}/{activeOutfit.angles.length}
                </div>
              </div>
              <div className="viewer360-outfit-name">{activeOutfit.name}</div>
              <div className="viewer360-indicator">
                {activeOutfit.angles.map((_, i) => (
                  <div key={i} className={`viewer360-dot ${i === currentAngle ? 'active' : ''}`}
                    onClick={() => setCurrentAngle(i)} style={{ cursor: 'pointer' }} />
                ))}
              </div>
              <div className="viewer360-hint">👆 Drag left/right to rotate • Tap dots to jump</div>
            </div>
          )}
        </div>
      );
    }

          const fetchPromise = supabase
            .from('posts')
            .select('*, profiles(display_name, avatar_emoji, role)')
            .order('created_at', { ascending: false })
            .limit(50);
          const { data, error } = await Promise.race([fetchPromise, timeoutPromise]);
          if (error) throw error;
          if (data && data.length > 0) {
            // Fetch counts for each post
            const postIds = data.map(p => p.id);
            const [likesRes, commentsRes, reactionsRes, pollVotesRes, ynVotesRes, bookmarksRes] = await Promise.all([
              supabase.from('post_likes').select('post_id, user_id').in('post_id', postIds),
              supabase.from('post_comments').select('*').in('post_id', postIds).order('created_at', { ascending: true }),
              supabase.from('post_reactions').select('post_id, emoji, user_id').in('post_id', postIds),
              supabase.from('post_poll_votes').select('post_id, option_index, user_id').in('post_id', postIds),

              const postYnVotes = (ynVotesRes.data || []).filter(v => v.post_id === post.id);

              // Build reaction counts
              const reactionCounts = {};
              postReactions.forEach(r => { reactionCounts[r.emoji] = (reactionCounts[r.emoji] || 0) + 1; });

              // Build poll vote counts
              let pollData = null;
              if (post.poll_question && post.poll_options) {
                const opts = post.poll_options;

                const myVote = postPollVotes.find(v => v.user_id === userId);
                pollData = { question: post.poll_question, options: opts, votes: voteCounts, totalVotes: postPollVotes.length, myVote: myVote ? myVote.option_index : undefined };
              }

              // Build yes/no vote counts
              let voteData = null;
              if (post.vote_question) {
                const yesCount = postYnVotes.filter(v => v.choice === 'yes').length;
                const noCount = postYnVotes.filter(v => v.choice === 'no').length;
                const myVote = postYnVotes.find(v => v.user_id === userId);
                voteData = { question: post.vote_question, yes: yesCount, no: noCount, totalVotes: postYnVotes.length, myChoice: myVote ? myVote.choice : undefined };
              }

              // My reaction
              const myReaction = postReactions.find(r => r.user_id === userId);

              // My like
              const iLiked = postLikes.some(l => l.user_id === userId);

              // Bookmarked
              const iBookmarked = (bookmarksRes.data || []).some(b => b.post_id === post.id);

              // Pinned comment
              const pinned = postComments.find(c => c.is_pinned);

              const profile = post.profiles || {};
              const typeLabels = { 'portfolio': 'Portfolio', 'session-preview': 'Session Preview', 'availability': 'Now Booking', 'behind-scenes': 'Behind the Scenes' };

              // Subtract user's own like/reaction so the +1 display math works
              const baseLikes = iLiked ? postLikes.length - 1 : postLikes.length;

              // For reactions, subtract user's own so +1 display math works
              if (myReaction) {
                reactionCounts[myReaction.emoji] = (reactionCounts[myReaction.emoji] || 1) - 1;
              }

              // For polls, subtract user's own vote
              if (pollData && pollData.myVote !== undefined) {
                pollData.votes[pollData.myVote] = Math.max(0, pollData.votes[pollData.myVote] - 1);
                pollData.totalVotes = Math.max(0, pollData.totalVotes - 1);
              }

              // For yes/no votes, subtract user's own
              if (voteData && voteData.myChoice) {
                if (voteData.myChoice === 'yes') voteData.yes = Math.max(0, voteData.yes - 1);
                else voteData.no = Math.max(0, voteData.no - 1);
              }

              return {
                id: post.id,
                userEmoji: profile.avatar_emoji || '👤',
                userName: profile.display_name || 'Anonymous',
                verified: true,
                userType: profile.role || 'model',
                userId: post.user_id,
                time: timeAgo(post.created_at),
                type: post.type,
                typeLabel: typeLabels[post.type] || post.type,
                text: post.text,
                imageEmoji: post.image_url || '',
                likes: baseLikes,
                iLiked,
                commentCount: postComments.length,
                tips: 0,
                locked: post.locked || false,
                poll: pollData,
                vote: voteData,
                fanActivated: post.fan_activated || false,
                reactions: reactionCounts,
                myReaction: myReaction ? myReaction.emoji : null,
                pinnedComment: pinned ? { author: 'User', emoji: '👤', text: pinned.text } : null,
                previewComments: postComments.slice(0, 2).map(c => ({ author: 'User', emoji: '👤', text: c.text, id: c.id })),
                allComments: postComments,
                iBookmarked
              };
            });
            setRealPosts(enriched);
            // Set initial liked/bookmarked/pollVotes/voteChoices/userReactions state
            const likedInit = {};
            const bookInit = {};
            const pollInit = {};
            const voteInit = {};
            const reactInit = {};
            enriched.forEach(p => {
              if (p.iLiked) likedInit[p.id] = true;
              if (p.iBookmarked) bookInit[p.id] = true;
              if (p.poll?.myVote !== undefined) pollInit[p.id] = p.poll.myVote;
              if (p.vote?.myChoice) voteInit[p.id] = p.vote.myChoice;
              if (p.myReaction) reactInit[p.id] = p.myReaction;
            });
            setLiked(prev => ({ ...prev, ...likedInit }));
            setBookmarked(prev => ({ ...prev, ...bookInit }));
            setPollVotes(prev => ({ ...prev, ...pollInit }));
            setVoteChoices(prev => ({ ...prev, ...voteInit }));
            setUserReactions(prev => ({ ...prev, ...reactInit }));
          }
        } catch (err) {
          console.error('Feed fetch error:', err);
        } finally {
          setLoadingPosts(false);
        }

      const timeAgo = (dateStr) => {
        const now = new Date();
        const then = new Date(dateStr);
        const diff = Math.floor((now - then) / 1000);
        if (diff < 60) return 'just now';
        if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
        if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
        if (diff < 604800) return Math.floor(diff / 86400) + 'd ago';
        return then.toLocaleDateString();
      };

      // Fetch follows (private — only the logged-in user's follows)
      const fetchFollows = async () => {

          const { data } = await supabase.from('follows').select('following_id').eq('follower_id', auth.profile.id);
          if (data) {
            const followMap = {};
            data.forEach(f => { followMap[f.following_id] = true; });
            setFollowing(followMap);

      useEffect(() => { fetchPosts(); fetchFollows(); }, []);

            postData.poll_question = postPollQuestion.trim();
            postData.poll_options = postPollOptions.filter(o => o.trim());
            postData.fan_activated = true;

          if (postEngagementType === 'vote') {
            postData.vote_question = postVoteQuestion.trim();
          }
          const { data, error } = await supabase.from('posts').insert(postData).select().single();

          fetchPosts(); // Refresh feed

      const toggleLike = async (postId) => {
        const wasLiked = liked[postId];
        setLiked(prev => ({ ...prev, [postId]: !prev[postId] }));
        if (!auth?.profile?.id) return;

      };

        try {

          } else {

      };

      const toggleFollow = async (userId) => {

        if (userId === auth.profile.id) return; // Can't follow yourself
        const wasFollowing = following[userId];
        setFollowing(prev => ({ ...prev, [userId]: !prev[userId] }));
        try {

            await supabase.from('follows').delete().eq('follower_id', auth.profile.id).eq('following_id', userId);
          } else {
            await supabase.from('follows').insert({ follower_id: auth.profile.id, following_id: userId });

        } catch (err) { console.error('Follow error:', err); }
      };

      const toggleComments = (postId) => {

      const addComment = async (postId) => {

        const text = commentText[postId].trim();
        // Optimistic update
        setComments(prev => ({

          [postId]: [...(prev[postId] || []), { author: auth?.profile?.display_name || 'You', emoji: auth?.profile?.avatar_emoji || '👤', text }]
        }));

      const openStory = (storyId) => {

        if (story && story.items && story.items.length > 0) {

    /*
    -- DM Polls tables
    CREATE TABLE dm_polls (
      id uuid DEFAULT gen_random_uuid() PRIMARY KEY,
      model_id uuid REFERENCES profiles(id) ON DELETE CASCADE,
      question text NOT NULL,
      options jsonb NOT NULL DEFAULT '[]',
      folder text,
      created_at timestamptz DEFAULT now()
    );
    ALTER TABLE dm_polls ENABLE ROW LEVEL SECURITY;
    CREATE POLICY "Models manage own polls" ON dm_polls FOR ALL USING (auth.uid() = model_id);

    CREATE TABLE dm_poll_responses (
      id uuid DEFAULT gen_random_uuid() PRIMARY KEY,
      message_id uuid NOT NULL,
      voter_id uuid REFERENCES profiles(id) ON DELETE CASCADE,
      option_index integer NOT NULL,
      created_at timestamptz DEFAULT now(),
      UNIQUE(message_id, voter_id)
    );
    ALTER TABLE dm_poll_responses ENABLE ROW LEVEL SECURITY;
    CREATE POLICY "Users can vote" ON dm_poll_responses FOR INSERT WITH CHECK (auth.uid() = voter_id);
    CREATE POLICY "Users can see votes" ON dm_poll_responses FOR SELECT USING (true);
    */

    function MessagesPage({ conversationId }) {
      const auth = useContext(AuthContext);

      const [selectedPollFolder, setSelectedPollFolder] = useState('All');
      const [creatingPoll, setCreatingPoll] = useState(false);
      const [newPollQuestion, setNewPollQuestion] = useState('');
      const [newPollOptions, setNewPollOptions] = useState(['', '']);
      const [newPollFolder, setNewPollFolder] = useState('');
      const [pollResponses, setPollResponses] = useState({});

      const hasCherryPicker = (auth.profile?.role === 'model' && auth.profile?.cherry_picker_active) || cherryPickerDirect;

      // Direct fallback: fetch cherry_picker_active from DB in case auth.profile is slow/missing
      useEffect(() => {

          supabase
            .from('profiles')
            .select('cherry_picker_active, role')
            .eq('id', auth.currentUser.id)
            .single()
            .then(({ data }) => {
              if (data?.role === 'model' && data?.cherry_picker_active) {
                setCherryPickerDirect(true);
              }
            });
        }
      }, [auth.currentUser]);

      // Fetch poll library for models
      useEffect(() => {
        if (auth.currentUser && auth.profile?.role === 'model') {
          const fetchPolls = async () => {
            const { data, error } = await supabase
              .from('dm_polls')
              .select('*')
              .eq('model_id', auth.currentUser.id)
              .order('created_at', { ascending: false });
            if (!error && data) {
              setPollLibrary(data);
              const folders = [...new Set(data.map(p => p.folder).filter(Boolean))];
              setPollFolders(folders);
            }
          };
          fetchPolls();
        }
      }, [auth.currentUser, auth.profile?.role]);

      // Fetch poll responses when messages load
      useEffect(() => {
        const fetchPollResponses = async () => {
          if (!messages.length) return;
          const pollMessages = messages.filter(msg => {
            try {
              const parsed = JSON.parse(msg.content);
              return parsed.type === 'poll';
            } catch { return false; }
          });
          if (!pollMessages.length) return;
          const msgIds = pollMessages.map(m => m.id);
          const { data, error } = await supabase
            .from('dm_poll_responses')
            .select('*')
            .in('message_id', msgIds);
          if (!error && data) {
            const grouped = {};
            data.forEach(r => {
              if (!grouped[r.message_id]) grouped[r.message_id] = [];
              grouped[r.message_id].push(r);
            });
            setPollResponses(grouped);
          }
        };
        fetchPollResponses();
      }, [messages]);

      // Auto-select pinned message when cherry picker becomes available
      useEffect(() => {
        if (hasCherryPicker && !conversationId && !selectedConvId) {

      }, [hasCherryPicker]);

      const cherryPickerPrompt = `You are a high-intent audience researcher. Your sole job is to find REPEAT ENGAGERS -- people who consistently like, comment, repost, and interact with creators in a specific niche. You are looking for fans who show up again and again, not one-time visitors.

TASK
I have pasted a list of creator accounts and their platforms in this conversation (either above or below this prompt). Find that list and use it as your targets. For each account, visit their profile, review their most recent posts, and track every person who engages. Filter for ONLY the people who repeatedly engage, classify how they engage, and return a clean list grouped by platform.

STEP 1 -- VISIT EACH ACCOUNT
For each target account in the list I provided:
- Navigate to their profile on the specified platform
- Open their 10 most recent public posts
- For each post, review: the visible comments (note who commented and what they said), the visible likes (note usernames where the platform shows them), any reposts/shares/quote posts if visible, any saves or bookmarks if visible

STEP 2 -- BUILD THE MASTER TRACKER
Build ONE running master list across ALL target accounts. Do NOT start fresh for each account. For EVERY person who engages on EVERY post, add or update their entry with: their username/handle, engagement type (COMMENT, LIKE, REPOST, SHARE, SAVE, QUOTE, TAG), which target account's post it was on, how many times total they have appeared so far, and what they said if it was a comment (keep the full text).

The same person appearing across multiple target accounts is the MOST VALUABLE signal. You can only detect this if you keep one unified list the entire time. Do NOT discard, summarize, or compress this list as you go.

STEP 3 -- HARD FILTER: REPEATERS ONLY
This is the most important step. Apply these rules strictly.

KEEP a person ONLY if they meet at least ONE of these thresholds:
- Engaged 3+ times total across all posts reviewed (any combination of likes, comments, reposts)
- Appeared on posts from 2+ DIFFERENT target accounts (even if only once on each)
- Commented 2+ times with substantive text (not just emojis or one-word reactions)

REMOVE everyone who:
- Engaged only once or twice total with no cross-account presence
- Has a profile that appears to be a bot (generic name, no posts, spammy bio)
- Is another creator or model (verified, large following, content creator bio)
- Only left self-promotional comments
- Only left emoji-only reactions with no other engagement

The resulting list should contain ONLY habitual engagers. If the list is small, that is correct. Do NOT lower the threshold to fill a quota. Quality over quantity.

STEP 4 -- CLASSIFY EACH REPEATER
For every person who passed the filter, assign ALL classifications that apply:

COMMENTER -- Left substantive comments on 2+ posts
LIKER -- Liked 3+ posts across the accounts reviewed
REPOSTER -- Reposted, shared, or quote-posted content
QUESTIONER -- Asked questions (about rates, availability, process, future content)
DEFENDER -- Replied to other commenters in support of the creator
BUYER-SIGNAL -- Used language suggesting spending intent

STEP 5 -- SORT
Rank by total engagement count (highest first). Among ties, prioritize: people who appeared across the most different target accounts, people with BUYER-SIGNAL or QUESTIONER classifications, people with the most recent engagement. Keep the top 20. If fewer than 20 qualify, return however many passed. Do NOT add anyone who did not pass the filter.

STEP 6 -- GENERATE ONE OUTREACH MESSAGE
Write a single DM-style outreach message from a female model to a male fan. It should feel flirty and direct, reference his interest in boudoir, kink, or fantasy photography, and invite him to check out her work or book a private session. Keep it under 50 words. Do not mention ModelBid, AI, data, or this tool.

OUTPUT FORMAT
Return ONLY the following. No commentary. No explanations. No process summary. Just this exact format:

CHERRY PICK RESULTS
--------------------

"Platform Name"
@username1 -- Classification: COMMENTER, LIKER
@username2 -- Classification: REPOSTER, BUYER-SIGNAL
@username3 -- Classification: COMMENTER, QUESTIONER, LIKER

"Platform Name"
@username4 -- Classification: COMMENTER, LIKER
@username5 -- Classification: REPOSTER, QUESTIONER

--------------------
OUTREACH MESSAGE:

"Your generated outreach message here"
--------------------

RULES
- ONLY return people who are repeat engagers. Non-negotiable.
- Only return the formatted results. Nothing else before or after.
- Do not explain your process.
- Do not summarize what you found.
- Do not add tips, suggestions, or analysis.
- If you cannot access an account (private, suspended), skip it silently.
- If a platform requires sign-in to view comments or likes, tell the user to sign in first, then re-run.
- Respect rate limits. Move at a natural browsing pace.
- Group results by platform.`;

      const cherryPickerInstructions = `HOW TO USE THIS PROMPT:

- Let Claude finish completely before touching your browser
- Don't use a private/incognito window — your logins won't carry over

      const handleCopyPinnedPrompt = () => {

        setTimeout(() => setPinnedCopied(false), 2000);

      const scrollToBottom = () => {

            <span style={{ marginLeft: 'auto', fontSize: '0.7rem', background: 'rgba(255,110,199,0.15)', color: '#ff6ec7', padding: '2px 8px', borderRadius: 8, fontWeight: 700 }}>PINNED</span>

    // ===== MODEL REVENUE NUDGES =====
    // Contextual cards that guide models toward their next revenue stream
    // Ordered by progression: Bookings → Tips → Private Feed → WeStackr
    function ModelNudges({ context, limit }) {
      const auth = useContext(AuthContext);
      if (!auth.profile || auth.profile.role !== 'model') return null;

      const profile = auth.profile;
      const sessions = profile.sessions_completed || 0;
      const hasInnerCircle = false; // will check DB later
      const hasCampaign = false; // will check DB later

      // Build nudge list based on what she hasn't unlocked yet — progression order
      const allNudges = [];

      // 1. Bookings — if she has 0 sessions, this is the #1 priority
      if (sessions === 0) {
        allNudges.push({
          id: 'first-booking',
          icon: '📅',
          iconBg: 'linear-gradient(135deg, rgba(255,110,199,0.15), rgba(157,78,221,0.15))',
          title: 'Get your first booking',
          desc: 'Complete your profile and post on the Feed so clients can find you. Your first session is the start of everything.',
          earn: null,
          earnColor: null,
          link: 'edit-profile',
          contexts: ['dashboard', 'feed', 'browse']
        });
      }

      // 2. Tips — if she hasn't posted much on the Feed
      allNudges.push({
        id: 'tips',
        icon: '💸',
        iconBg: 'linear-gradient(135deg, rgba(255,215,0,0.15), rgba(255,152,0,0.15))',
        title: 'Earn tips on your posts',
        desc: 'Every post you share on the Feed has a tip button. Behind-the-scenes shots and session previews earn the most.',
        earn: 'Passive income',
        earnBg: 'rgba(255,215,0,0.1)',
        earnColor: '#ffd700',
        link: 'feed',
        contexts: ['dashboard', 'browse']
      });

      // 3. Private Feed — the subscription play
      if (!hasInnerCircle) {
        allNudges.push({
          id: 'inner-circle',
          icon: '💎',
          iconBg: 'linear-gradient(135deg, rgba(255,215,0,0.15), rgba(255,110,199,0.15))',
          title: 'Launch your Private Feed',
          desc: 'Fans pay monthly for exclusive content, early booking access, and discounts. Recurring income that grows with your audience.',
          earn: 'Recurring revenue',
          earnBg: 'rgba(157,78,221,0.1)',
          earnColor: '#c44dff',
          link: 'circle/' + (profile.id || 'demo'),
          contexts: ['dashboard', 'feed']
        });
      }

      // 4. WeStackr — the crowdfunding play
      if (!hasCampaign) {
        allNudges.push({
          id: 'westackr',
          icon: '⚡',
          iconBg: 'linear-gradient(135deg, rgba(0,230,118,0.15), rgba(0,188,212,0.15))',
          title: 'Crowdfund your dream shoot',
          desc: 'Got a creative idea that needs funding? Pitch it on WeStackr and let your fans and the community make it happen.',
          earn: 'Community-funded',
          earnBg: 'rgba(0,230,118,0.1)',
          earnColor: '#00e676',
          link: 'westackr',
          contexts: ['dashboard', 'feed']
        });
      }

      // Always show the boost nudge
      allNudges.push({
        id: 'boost',
        icon: '🚀',
        iconBg: 'linear-gradient(135deg, rgba(255,110,199,0.15), rgba(255,215,0,0.15))',
        title: 'Boost your visibility',
        desc: 'Get featured in the Suggested Models strip on Browse and Feed. More eyes on your profile means more bookings.',
        earn: 'More bookings',
        earnBg: 'rgba(255,110,199,0.1)',
        earnColor: '#ff6ec7',
        link: 'edit-profile',
        contexts: ['dashboard', 'browse']
      });

      // Filter by context and limit
      const filtered = allNudges.filter(n => n.contexts.includes(context));
      const shown = limit ? filtered.slice(0, limit) : filtered;

      if (shown.length === 0) return null;

      // Determine progression state for each nudge
      const featuresUsed = profile.features_used || [];
      // Progression order: first-booking → tips → inner-circle → westackr → boost
      let foundNext = false;
      const withState = shown.map(nudge => {
        if (featuresUsed.includes(nudge.id)) {
          return { ...nudge, state: 'completed' };
        } else if (!foundNext) {
          foundNext = true;
          return { ...nudge, state: 'next' };
        } else {
          return { ...nudge, state: 'upcoming' };
        }
      });

      return (
        <div>
          <div className="nudge-section-label">💰 Ways to earn</div>
          <div className="nudge-grid">
            {withState.map(nudge => (
              <div key={nudge.id} className={`nudge-card ${nudge.state}`} onClick={() => nudge.state !== 'completed' && (window.location.hash = nudge.link)}>
                <div className="nudge-icon" style={{ background: nudge.iconBg }}>
                  {nudge.icon}
                </div>
                <div className="nudge-content">
                  <div className="nudge-title">{nudge.title}</div>
                  <div className="nudge-desc">{nudge.desc}</div>
                  {nudge.earn && (
                    <div className="nudge-earn" style={{ background: nudge.earnBg, color: nudge.earnColor }}>
                      {nudge.earn}
                    </div>
                  )}
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function DashboardPage() {
      const auth = useContext(AuthContext);
      const [bookings, setBookings] = useState([]);
      const [loading, setLoading] = useState(true);
      const [myCampaigns, setMyCampaigns] = useState([]);
      const [myCampaignItems, setMyCampaignItems] = useState({});
      const [showAddProduct, setShowAddProduct] = useState(null); // campaign_id or null
      const [newProduct, setNewProduct] = useState({ name: '', price: '', description: '', image_url: '', inventory: '' });

      // Fetch user's campaigns + store items
      useEffect(() => {
        if (!auth.currentUser) return;
        const fetchMyCampaigns = async () => {
          try {
            const { data } = await supabase.from('campaigns').select('*')
              .eq('creator_id', auth.currentUser.id).order('created_at', { ascending: false });
            if (data) {
              setMyCampaigns(data);
              const storeIds = data.filter(c => c.store_mode_enabled).map(c => c.id);
              if (storeIds.length > 0) {
                const { data: items } = await supabase.from('store_items').select('*')
                  .in('campaign_id', storeIds).eq('is_active', true).order('created_at', { ascending: true });
                if (items) {
                  const map = {};
                  items.forEach(item => { if (!map[item.campaign_id]) map[item.campaign_id] = []; map[item.campaign_id].push(item); });
                  setMyCampaignItems(map);
                }
              }
            }
          } catch (e) { console.error('Fetch my campaigns:', e); }
        };
        fetchMyCampaigns();
      }, [auth.currentUser]);

      const handleAddStoreProduct = async (campaignId) => {
        if (!newProduct.name || !newProduct.price) return;
        try {
          const { data, error } = await supabase.from('store_items').insert({
            campaign_id: campaignId,
            name: newProduct.name.trim(),
            description: newProduct.description.trim() || null,
            price: parseFloat(newProduct.price),
            image_url: newProduct.image_url.trim() || null,
            inventory_count: parseInt(newProduct.inventory) || 0,
            sold_count: 0,
          }).select().single();
          if (error) throw error;
          setMyCampaignItems(prev => ({ ...prev, [campaignId]: [...(prev[campaignId] || []), data] }));
          setNewProduct({ name: '', price: '', description: '', image_url: '', inventory: '' });
          setShowAddProduct(null);
          auth.showToast('Product added!', 'success');
        } catch (e) { auth.showToast('Failed to add product: ' + e.message, 'error'); }
      };

      const handleDeleteStoreProduct = async (itemId, campaignId) => {
        try {
          await supabase.from('store_items').update({ is_active: false }).eq('id', itemId);
          setMyCampaignItems(prev => ({ ...prev, [campaignId]: (prev[campaignId] || []).filter(i => i.id !== itemId) }));
          auth.showToast('Product removed', 'success');
        } catch (e) { auth.showToast('Failed to remove product', 'error'); }
      };

      const handleToggleStore = async (campaign) => {
        try {
          const newVal = !campaign.store_mode_enabled;
          await supabase.from('campaigns').update({ store_mode_enabled: newVal }).eq('id', campaign.id);
          setMyCampaigns(prev => prev.map(c => c.id === campaign.id ? { ...c, store_mode_enabled: newVal } : c));
          auth.showToast(newVal ? 'Store enabled!' : 'Store disabled', 'success');
        } catch (e) { auth.showToast('Failed to toggle store', 'error'); }
      };

      const renderMyCampaigns = () => {
        if (myCampaigns.length === 0) return null;
        return (
          <div style={{ marginTop: '2rem' }}>
            <h3 style={{ marginBottom: '1rem' }}>My Campaigns</h3>
            {myCampaigns.map(camp => {
              const items = myCampaignItems[camp.id] || [];
              return (
                <div key={camp.id} className="card" style={{ marginBottom: '1rem' }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'start', marginBottom: '8px' }}>
                    <div>
                      <div style={{ fontWeight: 700 }}>{camp.title}</div>
                      <div style={{ fontSize: '0.85rem', color: '#888' }}>
                        ${Number(camp.raised || 0).toLocaleString()} / ${Number(camp.goal).toLocaleString()} • {camp.category}
                      </div>
                    </div>
                    <span style={{ fontSize: '0.8rem', padding: '2px 8px', borderRadius: '6px',
                      background: camp.funded ? 'rgba(0,230,118,0.15)' : 'rgba(0,217,255,0.1)',
                      color: camp.funded ? '#00e676' : '#00d9ff' }}>
                      {camp.funded ? 'Funded' : camp.status || 'Active'}
                    </span>
                  </div>

                  {/* Store toggle */}
                  <div style={{ display: 'flex', alignItems: 'center', gap: '10px', marginTop: '10px',
                    padding: '8px 12px', background: 'rgba(255,110,199,0.06)', borderRadius: '8px',
                    border: '1px solid rgba(255,110,199,0.12)' }}>
                    <span style={{ fontSize: '0.85rem', color: '#ff6ec7', fontWeight: 600 }}>🛍️ Store</span>
                    <button onClick={() => handleToggleStore(camp)} style={{
                      width: '40px', height: '22px', borderRadius: '11px', border: 'none', cursor: 'pointer',
                      background: camp.store_mode_enabled ? '#ff6ec7' : 'rgba(255,255,255,0.1)', position: 'relative', transition: 'background 0.2s'
                    }}>
                      <div style={{ width: '16px', height: '16px', borderRadius: '50%', background: '#fff',
                        position: 'absolute', top: '3px', left: camp.store_mode_enabled ? '21px' : '3px',
                        transition: 'left 0.2s', boxShadow: '0 1px 2px rgba(0,0,0,0.3)' }}></div>
                    </button>
                    <span style={{ fontSize: '0.78rem', color: '#888' }}>
                      {camp.store_mode_enabled ? `${items.length} product${items.length !== 1 ? 's' : ''}` : 'Disabled'}
                    </span>
                  </div>

                  {/* Store products list */}
                  {camp.store_mode_enabled && (
                    <div style={{ marginTop: '8px' }}>
                      {items.map(item => (
                        <div key={item.id} style={{ display: 'flex', alignItems: 'center', gap: '8px', padding: '6px 10px',
                          background: 'rgba(255,255,255,0.03)', borderRadius: '6px', marginBottom: '4px', fontSize: '0.83rem' }}>
                          {item.image_url && <img src={item.image_url} alt="" style={{ width: '28px', height: '28px', borderRadius: '4px', objectFit: 'cover' }}
                            onError={(e) => e.target.style.display = 'none'} />}
                          <span style={{ flex: 1 }}><strong>{item.name}</strong> — ${Number(item.price).toFixed(2)}</span>
                          <span style={{ color: '#888', fontSize: '0.75rem' }}>{item.sold_count || 0} sold</span>
                          <button onClick={() => handleDeleteStoreProduct(item.id, camp.id)}
                            style={{ background: 'none', border: 'none', color: 'var(--danger-red)', cursor: 'pointer', fontSize: '0.9rem' }}>✕</button>
                        </div>
                      ))}

                      {/* Add product */}
                      {showAddProduct === camp.id ? (
                        <div style={{ background: 'rgba(255,110,199,0.04)', border: '1px dashed rgba(255,110,199,0.2)',
                          borderRadius: '8px', padding: '10px', marginTop: '6px' }}>
                          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '6px' }}>
                            <input type="text" placeholder="Product name *" value={newProduct.name}
                              onChange={(e) => setNewProduct({ ...newProduct, name: e.target.value })} style={{ fontSize: '0.83rem' }} />
                            <input type="number" placeholder="Price ($) *" value={newProduct.price} min="0.01" step="0.01"
                              onChange={(e) => setNewProduct({ ...newProduct, price: e.target.value })} style={{ fontSize: '0.83rem' }} />
                            <input type="text" placeholder="Image URL" value={newProduct.image_url}
                              onChange={(e) => setNewProduct({ ...newProduct, image_url: e.target.value })} style={{ fontSize: '0.83rem' }} />
                            <input type="number" placeholder="Inventory (0=unlimited)" value={newProduct.inventory} min="0"
                              onChange={(e) => setNewProduct({ ...newProduct, inventory: e.target.value })} style={{ fontSize: '0.83rem' }} />
                          </div>
                          <input type="text" placeholder="Description (optional)" value={newProduct.description}
                            onChange={(e) => setNewProduct({ ...newProduct, description: e.target.value })}
                            style={{ fontSize: '0.83rem', marginTop: '6px', width: '100%' }} />
                          <div style={{ display: 'flex', gap: '6px', marginTop: '8px' }}>
                            <button onClick={() => handleAddStoreProduct(camp.id)}
                              disabled={!newProduct.name || !newProduct.price}
                              style={{ padding: '5px 14px', borderRadius: '6px', border: 'none', fontSize: '0.82rem', fontWeight: 600,
                                background: newProduct.name && newProduct.price ? '#ff6ec7' : 'rgba(255,255,255,0.08)',
                                color: newProduct.name && newProduct.price ? '#fff' : '#666',
                                cursor: newProduct.name && newProduct.price ? 'pointer' : 'not-allowed' }}>
                              Save Product
                            </button>
                            <button onClick={() => { setShowAddProduct(null); setNewProduct({ name: '', price: '', description: '', image_url: '', inventory: '' }); }}
                              style={{ padding: '5px 14px', borderRadius: '6px', border: '1px solid rgba(255,255,255,0.1)',
                                background: 'none', color: '#888', cursor: 'pointer', fontSize: '0.82rem' }}>Cancel</button>
                          </div>
                        </div>
                      ) : (
                        <button onClick={() => setShowAddProduct(camp.id)}
                          style={{ marginTop: '6px', padding: '5px 14px', borderRadius: '6px', border: '1px dashed rgba(255,110,199,0.3)',
                            background: 'none', color: '#ff6ec7', cursor: 'pointer', fontSize: '0.82rem', fontWeight: 600 }}>
                          + Add Product
                        </button>
                      )}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        );
      };

      useEffect(() => {
        const fetchBookings = async () => {
          try {
            let query = supabase.from('bookings').select('*');

            if (auth.profile?.role === 'model') {
              query = query.eq('model_id', auth.currentUser.id);
            } else {
              query = query.eq('client_id', auth.currentUser.id);
            }

            const { data, error } = await query.order('created_at', { ascending: false });

            if (error) throw error;
            setBookings(data || []);
          } catch (error) {
            console.error('Fetch bookings error:', error);
          } finally {
            setLoading(false);
          }
        };

        if (auth.currentUser && auth.profile) {
          const timeout = setTimeout(() => setLoading(false), 2000);
          fetchBookings().then(() => clearTimeout(timeout));
        } else if (auth.currentUser) {
          // Profile hasn't loaded yet — wait briefly then show page anyway
          const timeout = setTimeout(() => setLoading(false), 2000);
          return () => clearTimeout(timeout);
        }
      }, [auth.currentUser, auth.profile]);

      if (loading && !auth.currentUser) {
        return <div className="text-center" style={{ padding: '2rem' }}>Loading dashboard...</div>;
      }

      const isModel = auth.profile?.role === 'model';

      if (isModel) {
        const pendingBookings = bookings.filter(b => b.status === 'pending');

        return (
          <div>
            <h2 style={{ marginBottom: '2rem' }}>Model Dashboard</h2>

            <div className="dashboard-grid">
              <div className="stat-card gradient">
                <div className="stat-value">${auth.profile.earnings || 0}</div>
                <div className="stat-label">Total Earnings</div>
              </div>
              <div className="stat-card">
                <div className="stat-value">{pendingBookings.length}</div>
                <div className="stat-label">Pending Requests</div>
              </div>
              <div className="stat-card">
                <div className="stat-value">{auth.profile.rating ? auth.profile.rating.toFixed(1) : '0.0'}★</div>
                <div className="stat-label">Rating</div>
              </div>
              <div className="stat-card">
                <div className="stat-value">{auth.profile.review_count || 0}</div>
                <div className="stat-label">Total Reviews</div>
              </div>
            </div>

            {/* Revenue nudges — contextual, progression-ordered */}
            <ModelNudges context="dashboard" limit={3} />

            {/* Inner Circles */}
            <div style={{ marginBottom: '2rem' }}>
              <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '1rem' }}>
                <h3 style={{ margin: 0 }}>👯‍♀️ Inner Circles</h3>
                <button onClick={() => window.location.hash = 'crew/crew-demo'} className="btn glow-btn" style={{ fontSize: '0.8rem', padding: '0.5rem 1rem' }}>Manage Crew</button>
              </div>
              <div onClick={() => window.location.hash = 'crew/crew-demo'} style={{ background: 'var(--bg-card)', borderRadius: '0.75rem', padding: '1.25rem', border: '1px solid var(--border-color)', cursor: 'pointer', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: '1rem' }}>
                  <div style={{ fontSize: '2rem' }}>👯‍♀️</div>
                  <div>
                    <div style={{ fontWeight: 700, fontSize: '1rem', marginBottom: '0.25rem' }}>Studio Queens</div>
                    <div style={{ fontSize: '0.8rem', color: 'var(--text-secondary)' }}>3 members · 47 subscribers · $14.99/mo</div>
                  </div>
                </div>
                <div style={{ textAlign: 'right' }}>
                  <div style={{ fontWeight: 700, fontSize: '1.1rem', color: 'var(--accent-gold)' }}>$287.45</div>
                  <div style={{ fontSize: '0.75rem', color: 'var(--text-secondary)' }}>Your earnings</div>
                </div>
              </div>
              <div style={{ marginTop: '0.75rem', textAlign: 'center' }}>
                <button onClick={() => window.location.hash = 'crew/new'} style={{ background: 'none', border: '1px dashed var(--border-color)', borderRadius: '0.5rem', padding: '0.6rem 1.25rem', color: 'var(--text-secondary)', fontSize: '0.8rem', cursor: 'pointer', width: '100%' }}>+ Create New Crew</button>
              </div>
            </div>

            <h3 style={{ marginBottom: '1rem' }}>Booking Requests</h3>
            <div className="grid">
              {bookings.map(booking => (
                <div key={booking.id} className="card">
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'start', marginBottom: '1rem' }}>
                    <div>
                      <div style={{ fontWeight: '700' }}>Client</div>
                      <div style={{ color: 'var(--text-secondary)', fontSize: '0.9rem' }}>{booking.session_date} • {booking.duration_hours}h</div>
                    </div>
                    <div className={`badge ${booking.status === 'pending' ? 'badge-pending' : 'badge-success'}`}>
                      {booking.status.charAt(0).toUpperCase() + booking.status.slice(1)}
                    </div>
                  </div>
                  <div style={{ color: 'var(--text-secondary)', fontSize: '0.9rem', marginBottom: '1rem' }}>
                    <strong>Rate:</strong> ${booking.rate}<br />
                    <strong>Contract:</strong> {booking.contract_type}
                  </div>
                  {booking.status === 'pending' && (
                    <div style={{ display: 'flex', gap: '0.5rem' }}>
                      <button className="btn glow-btn btn-small" onClick={async () => {
                        await auth.updateBooking(booking.id, 'accepted');
                        setBookings(prev => prev.map(b => b.id === booking.id ? { ...b, status: 'accepted' } : b));
                      }}>Accept</button>
                      <button className="btn btn-secondary btn-small" onClick={async () => {
                        await auth.updateBooking(booking.id, 'declined');
                        setBookings(prev => prev.map(b => b.id === booking.id ? { ...b, status: 'declined' } : b));
                      }}>Decline</button>
                    </div>
                  )}
                </div>
              ))}
              {bookings.length === 0 && (
                <div className="empty-state">
                  <div className="empty-state-icon">📅</div>
                  <div className="empty-state-title">No bookings yet</div>
                </div>
              )}
            </div>

            {renderMyCampaigns()}
          </div>
        );
      } else {
        return (
          <div>
            <h2 style={{ marginBottom: '2rem' }}>Client Dashboard</h2>

            <div className="dashboard-grid">
              <div className="stat-card">
                <div className="stat-value">{auth.profile.subscription_tier === 'premium' ? 'Premium' : 'Free'}</div>
                <div className="stat-label">Subscription Status</div>
              </div>
              <div className="stat-card">
                <div className="stat-value">{bookings.length}</div>
                <div className="stat-label">Total Bookings</div>
              </div>
            </div>

            {auth.profile.subscription_tier === 'free' && (
              <div className="card" style={{ marginBottom: '2rem', border: '2px solid var(--accent-pink)', background: 'linear-gradient(135deg, rgba(255, 110, 199, 0.1), rgba(157, 78, 221, 0.1))' }}>
                <h3 style={{ marginBottom: '0.5rem', color: 'var(--accent-pink)' }}>Upgrade to Premium</h3>
                <p style={{ color: 'var(--text-secondary)', marginBottom: '1rem' }}>
                  Send messages to models, receive responses, and secure bookings with premium features.
                </p>
                <button className="btn glow-btn" onClick={() => auth.upgradeToPremium()}>Upgrade - {auth.profile?.role === 'model' ? '$29.99' : '$9.99'}/month</button>
              </div>

            <h3 style={{ marginBottom: '1rem' }}>Your Bookings</h3>
            <div className="grid">
              {bookings.map(booking => (
                <div key={booking.id} className="card">
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'start', marginBottom: '1rem' }}>

                    <strong>Rate:</strong> ${booking.rate}

                </div>

              {bookings.length === 0 && (
                <div className="empty-state">
                  <div className="empty-state-icon">📅</div>
                  <div className="empty-state-title">No bookings yet</div>
                  <div className="empty-state-text">Browse models and book your first session</div>

            {renderMyCampaigns()}
          </div>

      }

    function CreateCampaignForm({ onClose, onCreated }) {
      const auth = useContext(AuthContext);
      const [loading, setLoading] = useState(false);
      const [form, setForm] = useState({
        title: '', description: '', goal: '', category: '',
        image_url: '', duration_days: 30, backer_reward: '', co_admins: [],
        storeEnabled: false, storeEmbedUrl: '', products: []
      });
      const [adminInput, setAdminInput] = useState('');
      const [productDraft, setProductDraft] = useState({ name: '', price: '', description: '', image_url: '', inventory: '' });

      const categories = [
        { id: 'lingerie', label: 'Lingerie', icon: '👙' },
        { id: 'editorial', label: 'Editorial', icon: '📰' },
        { id: 'fantasy', label: 'Fantasy', icon: '🧚' },
        { id: 'vintage', label: 'Vintage', icon: '🎞️' },
        { id: 'outdoor', label: 'Outdoor', icon: '🌊' },
        { id: 'creative', label: 'Creative', icon: '🎨' },
        { id: 'boudoir', label: 'Boudoir', icon: '🌹' },
        { id: 'cosplay', label: 'Cosplay', icon: '🎭' },
      ];

      const detectEmbedProvider = (url) => {
        if (!url.trim()) return null;
        try {
          const host = new URL(url).hostname.toLowerCase();
          if (host.includes('etsy.com')) return 'etsy';
          if (host.includes('shopify.com') || host.endsWith('.myshopify.com')) return 'shopify';
          if (host.includes('gumroad.com')) return 'gumroad';
          return 'other';
        } catch { return 'other'; }
      };

      const addProduct = () => {
        if (!productDraft.name || !productDraft.price) return;
        setForm({ ...form, products: [...form.products, { ...productDraft }] });
        setProductDraft({ name: '', price: '', description: '', image_url: '', inventory: '' });
      };

      const removeProduct = (idx) => {
        setForm({ ...form, products: form.products.filter((_, i) => i !== idx) });
      };

      const addAdmin = () => {
        const name = adminInput.trim();
        if (name && !form.co_admins.includes(name)) {
          setForm({ ...form, co_admins: [...form.co_admins, name] });
          setAdminInput('');
        }
      };

      const removeAdmin = (name) => {
        setForm({ ...form, co_admins: form.co_admins.filter(a => a !== name) });
      };

      const handleSubmit = async () => {
        if (!auth.currentUser) {
          auth.showToast('Please sign in to create a campaign', 'error');
          return;
        }
        if (!form.title || !form.description || !form.goal || !form.category) {
          auth.showToast('Please fill in all required fields', 'error');
          return;
        }
        setLoading(true);
        try {
          const embedProvider = form.storeEnabled ? detectEmbedProvider(form.storeEmbedUrl) : null;
          const { data, error } = await supabase.from('campaigns').insert({
            creator_id: auth.currentUser.id,
            title: form.title,
            description: form.description,
            goal: parseFloat(form.goal),
            category: form.category,
            image_url: form.image_url || null,
            duration_days: parseInt(form.duration_days) || 30,
            backer_reward: form.backer_reward || null,
            co_admins: form.co_admins,
            source: 'modelbid',
            store_mode_enabled: form.storeEnabled,
            store_embed_url: form.storeEnabled && form.storeEmbedUrl ? form.storeEmbedUrl : null,
            store_embed_provider: embedProvider,
          }).select().single();

          if (error) throw error;

          // Insert store products if any
          if (form.storeEnabled && form.products.length > 0) {
            for (const p of form.products) {
              await supabase.from('store_items').insert({
                campaign_id: data.id,
                name: p.name.trim(),
                description: p.description.trim() || null,
                price: parseFloat(p.price),
                image_url: p.image_url.trim() || null,
                inventory_count: parseInt(p.inventory) || 0,
                sold_count: 0,
              });
            }
          }

          auth.showToast(form.storeEnabled ? 'Campaign + Store launched!' : 'Campaign launched!', 'success');
          onCreated(data);
          onClose();
        } catch (err) {
          console.error('Create campaign error:', err);
          auth.showToast('Failed to create campaign: ' + err.message, 'error');

          setLoading(false);

      return (

            <div className="ws-field">

            </div>

            <div className="ws-field">

              <div className="ws-cat-grid">
                {categories.map(cat => (

                    className={'ws-cat-chip' + (form.category === cat.id ? ' selected' : '')}
                    onClick={() => setForm({ ...form, category: cat.id })}>

      const [loadingDb, setLoadingDb] = useState(true);
      const isUpgraded = false; // demo: free-tier client

      // Fetch real campaigns + store items from Supabase
      useEffect(() => {
        const timeout = setTimeout(() => setLoadingDb(false), 3000);
        const fetchCampaigns = async () => {
          try {
            const { data, error } = await supabase
              .from('campaigns')
              .select('*, creator:profiles!creator_id(display_name, role, avatar_emoji)')
              .order('created_at', { ascending: false });
            if (!error && data) {
              setDbCampaigns(data);
              // Fetch store items for campaigns with store mode
              const storeCampaignIds = data.filter(c => c.store_mode_enabled).map(c => c.id);
              if (storeCampaignIds.length > 0) {
                const { data: items } = await supabase
                  .from('store_items')
                  .select('*')
                  .in('campaign_id', storeCampaignIds)
                  .eq('is_active', true)
                  .order('created_at', { ascending: true });
                if (items) {
                  const map = {};
                  items.forEach(item => {
                    if (!map[item.campaign_id]) map[item.campaign_id] = [];
                    map[item.campaign_id].push(item);
                  });
                  setStoreItemsMap(map);
                }
              }
            }
          } catch (e) { console.error('Fetch campaigns:', e); }
          finally { setLoadingDb(false); clearTimeout(timeout); }
        };
        fetchCampaigns();
        return () => clearTimeout(timeout);

                                        {available === 0 ? 'Sold Out' : 'Buy'}
                                      </button>
                                    </div>
                                  </div>
                                );

                          </div>

                    {!c.funded && (
                      <div className="ws-card-actions" style={{ marginTop: '14px' }}>
                        <button className="ws-pledge-btn" onClick={() => alert('Pledge flow coming with Stripe integration! You\'ll be able to choose your pledge amount.')}>
                          💰 Back This Shoot
                        </button>
                        <button className="ws-share-btn" onClick={() => { navigator.clipboard.writeText('https://modelbid.tech/#westackr/' + c.id); alert('Campaign link copied! Share it anywhere.'); }}>
                          🔗 Share Link

                        <button className="ws-msg-btn" onClick={() => {

                          alert('Opening conversation with ' + c.creator.name);
                        }}>
                          💬 Message
                        </button>
                      </div>
                    )}

                    {/* Messaging Gate for free-tier users */}
                    {!isUpgraded && !c.funded && (
                      <div className="ws-msg-gate">
                        <div className="ws-msg-gate-icon">🔒</div>
                        <div className="ws-msg-gate-text">
                          <strong>Messages Locked</strong>
                          <span>You can browse & back campaigns for free. Upgrade to read and send messages about this campaign.</span>
                        </div>
                        <button className="ws-msg-gate-btn" onClick={() => alert('Upgrade tiers coming soon with Stripe!')}>Upgrade</button>
                      </div>
                    )}
                  </div>
                </div>
              );
            })}
          </div>

          {filteredCampaigns.length === 0 && (
            <div style={{ textAlign: 'center', padding: '60px 20px', color: '#888' }}>
              <div style={{ fontSize: '3em', marginBottom: '10px' }}>📭</div>
              <p>No campaigns in this category yet. Be the first to start one!</p>
            </div>
          )}

          {/* Bottom CTA */}
          <div style={{ textAlign: 'center', marginTop: '40px', padding: '30px', background: 'rgba(0,230,118,0.05)', borderRadius: '16px', border: '1px solid rgba(0,230,118,0.15)' }}>
            <h3 style={{ color: '#00e676', marginBottom: '8px' }}>Got a shoot idea? 💡</h3>
            <p style={{ color: '#aaa', marginBottom: '16px', fontSize: '0.95em' }}>
              Whether you're a model with a creative vision or a client with a concept — pitch it, fund it, make it happen.
            </p>
            <button className="ws-create-btn" onClick={handleStartCampaign}>
              ⚡ Launch Your Campaign
            </button>
          </div>

          {/* Create Campaign Modal */}
          {showCreate && <CreateCampaignForm onClose={() => setShowCreate(false)} onCreated={handleCampaignCreated} />}
        </div>
      );
    }

    function EditProfilePage() {
      const { currentUser, profile, updateProfile } = useContext(AuthContext);
      const [data, setData] = useState(profile || {});
      const [loading, setLoading] = useState(false);
      const [uploadingProfile, setUploadingProfile] = useState(false);
      const [uploadingCover, setUploadingCover] = useState(false);
      const [promoSocialUrl, setPromoSocialUrl] = useState(profile?.promo_social_url || '');
      const [verifying, setVerifying] = useState(false);
      const [verifyStatus, setVerifyStatus] = useState(profile?.promo_verified ? 'verified' : (profile?.promo_social_url ? 'pending' : null));

      if (!profile) {
        return <div>Loading...</div>;
      }

      const handleSave = async () => {
        const linkPattern = /https?:\/\/\S+|www\.\S+|\S+\.(com|net|org|io|co|me|info|biz|xyz|app|dev|link|ly|to)\b/gi;
        if (data.bio && linkPattern.test(data.bio)) {
          alert('Links are not allowed in bios. Please remove any URLs before saving.');
          return;
        }
        setLoading(true);
        const success = await updateProfile(data);
        setLoading(false);
        if (success) {
          window.location.hash = `profile/${currentUser.id}`;
        }
      };

      const handlePhotoUpload = async (file, type) => {
        if (!file) return;
        if (file.size > 5 * 1024 * 1024) {
          alert('File too large. Max 5MB.');
          return;
        }
        const isProfilePic = type === 'profile';
        isProfilePic ? setUploadingProfile(true) : setUploadingCover(true);
        try {
          const ext = file.name.split('.').pop();
          const fileName = `${currentUser.id}/${type}_${Date.now()}.${ext}`;
          const { error: uploadError } = await supabase.storage
            .from('avatars')
            .upload(fileName, file, { upsert: true });
          if (uploadError) throw uploadError;
          const { data: urlData } = supabase.storage.from('avatars').getPublicUrl(fileName);
          const url = urlData.publicUrl;
          const field = isProfilePic ? 'profile_photo_url' : 'cover_photo_url';
          setData(prev => ({ ...prev, [field]: url }));
          await updateProfile({ [field]: url });
        } catch (err) {
          console.error('Upload error:', err);
          alert('Upload failed: ' + err.message);
        }
        isProfilePic ? setUploadingProfile(false) : setUploadingCover(false);
      };

      const myPromoLink = `modelbid.tech/#profile/${currentUser.id}`;

      const handlePromoSubmit = async () => {
        if (!promoSocialUrl.trim()) {
          alert('Please paste the link to your social page.');
          return;
        }
        // Basic URL validation
        const urlPattern = /^https?:\/\/.+/i;
        if (!urlPattern.test(promoSocialUrl.trim())) {
          alert('Please enter a valid URL starting with http:// or https://');
          return;
        }
        setVerifying(true);
        setVerifyStatus('checking');
        try {
          // Helper: fetch a page via proxy and return HTML or null
          const fetchPage = async (url) => {
            try {
              const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;
              const resp = await fetch(proxyUrl);
              if (resp.ok) return await resp.text();
            } catch (e) { console.log('Fetch failed for:', url, e); }
            return null;
          };

          // Helper: check if HTML contains our unique link
          const hasOurLink = (html) => {
            if (!html) return false;
            return html.includes(`profile/${currentUser.id}`) || html.includes(myPromoLink);
          };

          // Helper: extract link hub URLs from a page
          const findLinkHubs = (html) => {
            const hubPatterns = [
              /https?:\/\/(linktr\.ee|linktree\.com)\/[^\s"'<>]+/gi,
              /https?:\/\/(linkinhub|beacons\.ai|bio\.link|lnk\.bio|tap\.bio|campsite\.bio|hoo\.be|solo\.to|carrd\.co|about\.me|snipfeed\.co|allmylinks\.com|contactinbio\.com|withkoji\.com|flowpage\.com|milkshake\.app|shorby\.com)\/[^\s"'<>]+/gi,
              /https?:\/\/[^\s"'<>]*link[^\s"'<>]*\.[^\s"'<>]+/gi,
            ];
            const hubs = new Set();
            hubPatterns.forEach(pattern => {
              const matches = html.match(pattern) || [];
              matches.forEach(m => hubs.add(m.replace(/['">;,)]+$/, '')));
            });
            return [...hubs];
          };

          let found = false;

          // Step 1: Scan the submitted page directly
          const mainHtml = await fetchPage(promoSocialUrl.trim());
          found = hasOurLink(mainHtml);

          // Step 2: If not found, look for link hubs on the page and scan those
          if (!found && mainHtml) {
            const hubs = findLinkHubs(mainHtml);
            for (const hubUrl of hubs.slice(0, 5)) { // cap at 5 to avoid spam
              const hubHtml = await fetchPage(hubUrl);
              if (hasOurLink(hubHtml)) {
                found = true;
                break;
              }
            }
          }

          if (found) {
            // Link verified!
            await supabase.from('profiles').update({
              promo_social_url: promoSocialUrl.trim(),
              promo_verified: true,
              promo_verified_at: new Date().toISOString(),
              promo_last_checked: new Date().toISOString(),
              subscription_waived: true,
              promo_grace_deadline: null,
            }).eq('id', currentUser.id);
            setVerifyStatus('verified');
            setData(prev => ({ ...prev, promo_verified: true, subscription_waived: true, promo_social_url: promoSocialUrl.trim() }));
          } else {
            // Could not find the link
            await supabase.from('profiles').update({
              promo_social_url: promoSocialUrl.trim(),
              promo_verified: false,
              promo_last_checked: new Date().toISOString(),
            }).eq('id', currentUser.id);
            setVerifyStatus('not_found');
            setData(prev => ({ ...prev, promo_verified: false, promo_social_url: promoSocialUrl.trim() }));
          }
        } catch (err) {
          console.error('Verification error:', err);
          setVerifyStatus('error');
        }
        setVerifying(false);
      };

      const isModel = profile.role === 'model';

      return (
        <div style={{ maxWidth: '600px', margin: '2rem auto' }}>
          <button className="btn btn-secondary" onClick={() => window.location.hash = 'dashboard'} style={{ marginBottom: '2rem' }}>← Back</button>

          <div className="card">
            <h2 style={{ marginBottom: '1.5rem' }}>Edit Profile</h2>

            {/* MODEL PHOTO UPLOADS */}
            {isModel && (
              <div style={{ marginBottom: '1.5rem' }}>
                {/* Profile Photo — small square */}
                <div style={{ marginBottom: '1.2rem' }}>
                  <label style={{ display: 'block', marginBottom: '8px', fontWeight: 600, fontSize: '0.9rem' }}>Profile Photo</label>
                  <p style={{ color: '#888', fontSize: '0.78rem', marginBottom: '10px', marginTop: '-4px' }}>
                    Square headshot — this shows on your cards, browse page, and anywhere your name appears.
                  </p>
                  <div style={{ display: 'flex', alignItems: 'center', gap: '16px' }}>
                    <div style={{
                      width: '90px', height: '90px', borderRadius: '50%', overflow: 'hidden',
                      border: '2px solid var(--border-color)', background: 'var(--bg-card)',
                      display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0
                    }}>
                      {data.profile_photo_url ? (
                        <img src={data.profile_photo_url} alt="Profile" style={{ width: '100%', height: '100%', objectFit: 'cover' }} />
                      ) : (
                        <span style={{ fontSize: '2.2rem' }}>{data.avatar_emoji || '📷'}</span>

                    <div>

                        background: 'linear-gradient(135deg, #ff6ec7, #c44dff)', color: '#fff',
                        fontWeight: 700, fontSize: '0.82rem', cursor: 'pointer',
                        opacity: uploadingProfile ? 0.6 : 1
                      }}>
                        {uploadingProfile ? 'Uploading...' : (data.profile_photo_url ? 'Change Photo' : 'Upload Photo')}
                        <input type="file" accept="image/*" style={{ display: 'none' }}
                          onChange={(e) => handlePhotoUpload(e.target.files[0], 'profile')}
                          disabled={uploadingProfile} />
                      </label>
                      <div style={{ fontSize: '0.7rem', color: '#666', marginTop: '6px' }}>JPG, PNG — max 5MB. Ideal size: 500×500px</div>
                    </div>
                  </div>
                </div>

                {/* Cover Photo — wide horizontal */}
                <div>
                  <label style={{ display: 'block', marginBottom: '8px', fontWeight: 600, fontSize: '0.9rem' }}>Cover Photo</label>
                  <p style={{ color: '#888', fontSize: '0.78rem', marginBottom: '10px', marginTop: '-4px' }}>

    function getClientRepLevel(sessions, trustScore) {
      if (sessions >= 25 && trustScore >= 90) return { level: 5, name: 'Platinum Elite', icon: '💎', color: '#b388ff', next: null, sessionsNeeded: 0, trustNeeded: 0 };
      if (sessions >= 15 && trustScore >= 85) return { level: 4, name: 'Gold VIP', icon: '👑', color: '#ffd700', next: 'Platinum Elite', sessionsNeeded: 25 - sessions, trustNeeded: Math.max(0, 90 - trustScore) };
      if (sessions >= 10 && trustScore >= 80) return { level: 3, name: 'Silver Pro', icon: '🥈', color: '#c0c0c0', next: 'Gold VIP', sessionsNeeded: 15 - sessions, trustNeeded: Math.max(0, 85 - trustScore) };
      if (sessions >= 3 && trustScore >= 70) return { level: 2, name: 'Bronze Member', icon: '🥉', color: '#cd7f32', next: 'Silver Pro', sessionsNeeded: 10 - sessions, trustNeeded: Math.max(0, 80 - trustScore) };
      return { level: 1, name: 'Newcomer', icon: '🌱', color: '#66bb6a', next: 'Bronze Member', sessionsNeeded: 3 - sessions, trustNeeded: Math.max(0, 70 - trustScore) };
    }
