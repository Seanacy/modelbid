          userType: 'model', time: '1d ago', type: 'behind-scenes', typeLabel: 'Behind the Scenes',
          text: 'A little behind-the-scenes from the golden hour shoot. These moments between shots are my favorite part of the job. Full set coming to premium subscribers soon 👀',
          imageEmoji: '🌅', likes: 312, commentCount: 42, tips: 28, locked: false,
          previewComments: [
            { author: 'James K.', emoji: '🖤', text: 'The BTS content is always so good' },
            { author: 'Aria V.', emoji: '👩', text: 'You are glowing queen!' },
          ]
        },
        {
          id: 'p5', userEmoji: '🦋', userName: 'Raven Knight', verified: true,
          userType: 'model', time: '2d ago', type: 'portfolio', typeLabel: 'Portfolio',
          text: 'Premium exclusive: Full luxury lingerie editorial set from the penthouse shoot. 24 high-res photos. Subscribe to unlock.',
          imageEmoji: '💎', likes: 198, commentCount: 15, tips: 45, locked: true,
          previewComments: [
            { author: 'Premium Fan', emoji: '👑', text: 'Subscribed just for this. Worth it!' },
          ]
        },
      ];

      const toggleLike = (postId) => {
        setLiked(prev => ({ ...prev, [postId]: !prev[postId] }));
      };

      const toggleBookmark = (postId) => {
        setBookmarked(prev => ({ ...prev, [postId]: !prev[postId] }));
      };

      const toggleFollow = (userName) => {
        setFollowing(prev => ({ ...prev, [userName]: !prev[userName] }));
      };

      const toggleComments = (postId) => {
        setShowComments(prev => ({ ...prev, [postId]: !prev[postId] }));
      };

      const addComment = (postId) => {
        if (!commentText[postId]?.trim()) return;
        setComments(prev => ({
          ...prev,
          [postId]: [...(prev[postId] || []), { author: auth?.profile?.display_name || 'You', emoji: auth?.profile?.avatar_emoji || '👤', text: commentText[postId] }]
        }));
        setCommentText(prev => ({ ...prev, [postId]: '' }));
      };

      const openStory = (storyId) => {
        const story = stories.find(s => s.id === storyId);
        if (story && story.items && story.items.length > 0) {
          setViewingStory(story);
          setStoryIndex(0);
        }
      };

      const nextStoryItem = () => {
        if (viewingStory && storyIndex < viewingStory.items.length - 1) {
          setStoryIndex(prev => prev + 1);
        } else {
          setViewingStory(null);
        }
      };

      const prevStoryItem = () => {
        if (storyIndex > 0) {
          setStoryIndex(prev => prev - 1);
        }
      };

      const filteredPosts = feedTab === 'foryou' ? demoPosts :
        feedTab === 'models' ? demoPosts.filter(p => p.userType === 'model') :
        feedTab === 'clients' ? demoPosts.filter(p => p.userType === 'client') :
        feedTab === 'booking' ? demoPosts.filter(p => p.type === 'availability' || p.type === 'session-preview') :
        demoPosts;

      return (
        <div className="feed-container">
          {/* Stories Bar */}
          <div className="stories-bar">
            {stories.map(story => (
              <div key={story.id} className="story-item" onClick={() => story.isOwn ? null : openStory(story.id)}>
                <div className={`story-ring ${story.seen ? 'seen' : ''} ${story.isOwn ? 'add-story' : ''}`}>
                  <div className="story-avatar-inner">{story.emoji}</div>
                  {story.isOwn && <div className="story-add-icon">+</div>}
                </div>
                <div className="story-name">{story.name}</div>
              </div>
            ))}
          </div>

          {/* Feed Tabs */}
          <div className="feed-tabs">
            {[
              { key: 'foryou', label: 'For You' },
              { key: 'models', label: 'Models' },
              { key: 'clients', label: 'Clients' },
              { key: 'booking', label: 'Now Booking' },
            ].map(tab => (
              <button key={tab.key} className={`feed-tab ${feedTab === tab.key ? 'active' : ''}`} onClick={() => setFeedTab(tab.key)}>
                {tab.label}
              </button>
            ))}
          </div>

          {/* Create Post */}
          <div className="feed-create">
            {!showCreatePost ? (
              <div>
                <div className="feed-create-top">
                  <div className="feed-create-avatar">{auth?.profile?.avatar_emoji || '👤'}</div>
                  <div className="feed-create-input" onClick={() => setShowCreatePost(true)}>
                    Share a session preview, update, or availability...
                  </div>
                </div>
                <div className="feed-create-actions">
                  <button className="feed-create-btn" onClick={() => setShowCreatePost(true)}>📸 Photo</button>
                  <button className="feed-create-btn" onClick={() => setShowCreatePost(true)}>📅 Availability</button>
                  <button className="feed-create-btn" onClick={() => setShowCreatePost(true)}>✨ Portfolio</button>
                </div>
              </div>
            ) : (
              <div>
                <div style={{ display: 'flex', gap: '0.5rem', marginBottom: '0.75rem', flexWrap: 'wrap' }}>
                  {[
                    { key: 'portfolio', label: '✨ Portfolio' },
                    { key: 'session-preview', label: '📸 Session Preview' },
                    { key: 'availability', label: '📅 Availability' },
                    { key: 'behind-scenes', label: '🎬 Behind Scenes' },
                  ].map(t => (
                    <button key={t.key}
                      className={newPostType === t.key ? 'btn glow-btn' : 'btn btn-secondary'}
                      style={{ fontSize: '0.75rem', padding: '0.3rem 0.75rem' }}
                      onClick={() => setNewPostType(t.key)}
                    >{t.label}</button>
                  ))}
                </div>
                <textarea
                  value={newPostText}
                  onChange={(e) => setNewPostText(e.target.value)}
                  placeholder="What do you want to share?"
                  style={{
                    width: '100%', minHeight: '80px', background: 'var(--bg-card-light)',
                    border: '1px solid var(--border-color)', borderRadius: '0.5rem',
                    padding: '0.75rem', color: 'var(--text-primary)', fontSize: '0.9rem',
                    resize: 'vertical', marginBottom: '0.75rem'
                  }}
                />
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                  <div className="feed-create-actions">
                    <button className="feed-create-btn">📷 Add Photo</button>
                    <button className="feed-create-btn">🔒 Premium Only</button>
                  </div>
                  <div style={{ display: 'flex', gap: '0.5rem' }}>
                    <button className="btn btn-secondary" style={{ fontSize: '0.8rem' }} onClick={() => setShowCreatePost(false)}>Cancel</button>
                    <button className="btn glow-btn" style={{ fontSize: '0.8rem' }} onClick={() => {
                      if (newPostText.trim()) {
                        auth?.showToast?.('Post published!', 'success') || alert('Post published!');
                        setNewPostText('');
                        setShowCreatePost(false);
                      }
                    }}>Post</button>
                  </div>
                </div>
              </div>
            )}
          </div>

          {/* Posts Feed */}
          {filteredPosts.map(post => (
            <div key={post.id} className="post-card">
              {/* Post Header */}
              <div className="post-header">
                <div className={`post-avatar ${post.userType === 'client' ? 'client-type' : ''}`}
                  onClick={() => window.location.hash = post.userType === 'client' ? 'client/demo-client' : 'profile/demo'}>
                  {post.userEmoji}
                </div>
                <div className="post-user-info">
                  <div className="post-username"
                    onClick={() => window.location.hash = post.userType === 'client' ? 'client/demo-client' : 'profile/demo'}>
                    {post.userName}
                    {post.verified && <div className="verified-badge" style={{ width: '16px', height: '16px', fontSize: '0.6rem' }}>✓</div>}
                  </div>
                  <div className="post-meta">
                    {post.time}
                    <span className={`post-type-badge ${post.type}`}>{post.typeLabel}</span>
                  </div>
                </div>
                <button
                  className={`post-follow-btn ${following[post.userName] ? 'following' : ''}`}
                  onClick={() => toggleFollow(post.userName)}
                >
                  {following[post.userName] ? 'Following' : 'Follow'}
                </button>
              </div>

              {/* Post Text */}
              <div className="post-text">{post.text}</div>

              {/* Post Image */}
              <div className={`post-image ${post.locked ? 'post-image-locked' : ''}`}>
                {post.imageEmoji}
              </div>

              {/* Actions Bar */}
              <div className="post-actions-bar">
                <button className={`post-action ${liked[post.id] ? 'liked' : ''}`} onClick={() => toggleLike(post.id)}>
                  <span className="post-action-icon">{liked[post.id] ? '❤️' : '🤍'}</span>
                  {post.likes + (liked[post.id] ? 1 : 0)}
                </button>
                <button className="post-action" onClick={() => toggleComments(post.id)}>
                  <span className="post-action-icon">💬</span>
                  {post.commentCount + (comments[post.id]?.length || 0)}
                </button>
                <button className={`post-action ${bookmarked[post.id] ? 'bookmarked' : ''}`} onClick={() => toggleBookmark(post.id)}>
                  <span className="post-action-icon">{bookmarked[post.id] ? '🔖' : '📌'}</span>
                  Save
                </button>
                {post.userType === 'model' && (
                  <button className="post-tip-btn" onClick={() => auth?.showToast?.('Tips coming soon with Stripe!', 'info') || alert('Tips coming soon!')}>
                    💰 Tip
                  </button>
                )}
              </div>

              {/* Comments */}
              {(showComments[post.id] || post.previewComments?.length > 0) && (
                <div className="post-comments">
                  {post.previewComments?.map((c, i) => (
                    <div key={i} className="post-comment">
                      <div className="post-comment-avatar">{c.emoji}</div>
                      <div className="post-comment-body">
                        <span className="post-comment-author">{c.author}</span>
                        <span className="post-comment-text">{c.text}</span>
                      </div>
                    </div>
                  ))}
                  {comments[post.id]?.map((c, i) => (
                    <div key={`new-${i}`} className="post-comment">
                      <div className="post-comment-avatar">{c.emoji}</div>
                      <div className="post-comment-body">
                        <span className="post-comment-author">{c.author}</span>
                        <span className="post-comment-text">{c.text}</span>
                      </div>
                    </div>
                  ))}
                  {showComments[post.id] && (
                    <div className="post-comment-input">
                      <input
                        placeholder="Add a comment..."
                        value={commentText[post.id] || ''}
                        onChange={(e) => setCommentText(prev => ({ ...prev, [post.id]: e.target.value }))}
                        onKeyDown={(e) => e.key === 'Enter' && addComment(post.id)}
                      />
                      <button className="btn glow-btn" style={{ fontSize: '0.75rem', padding: '0.4rem 0.8rem' }} onClick={() => addComment(post.id)}>Post</button>
                    </div>
                  )}
                  {!showComments[post.id] && (
                    <div style={{ paddingTop: '0.5rem' }}>
                      <span style={{ fontSize: '0.8rem', color: 'var(--text-secondary)', cursor: 'pointer' }} onClick={() => toggleComments(post.id)}>
                        View all {post.commentCount} comments
                      </span>
                    </div>
                  )}
                </div>
              )}
            </div>
          ))}

          {/* Story Viewer Overlay */}
          {viewingStory && (
            <StoryViewer
              story={viewingStory}
              storyIndex={storyIndex}
              onNext={nextStoryItem}
              onPrev={prevStoryItem}
              onClose={() => setViewingStory(null)}
            />
          )}
        </div>
      );
    }

    /* Story Viewer - separate component */
    function StoryViewer({ story, storyIndex, onNext, onPrev, onClose }) {
      if (!story || !story.items || story.items.length === 0) return null;
      const item = story.items[storyIndex];

      return (
        <div className="story-viewer" onClick={onClose}>
          <div className="story-content" onClick={(e) => e.stopPropagation()}>
            <div className="story-image">
              {/* Progress bars */}
              <div className="story-progress">
                {story.items.map((_, i) => (
                  <div key={i} className="story-progress-bar">
                    <div className="story-progress-fill" style={{ width: i < storyIndex ? '100%' : i === storyIndex ? '100%' : '0%' }}></div>
                  </div>
                ))}
              </div>

              {/* Header */}
              <div className="story-header">
                <div style={{ width: '36px', height: '36px', borderRadius: '50%', background: 'linear-gradient(135deg, var(--accent-purple), var(--accent-pink))', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '1rem' }}>
                  {story.emoji}
                </div>
                <div>
                  <div style={{ fontWeight: 700, fontSize: '0.9rem' }}>{story.name}</div>
                  <div style={{ fontSize: '0.75rem', color: 'rgba(255,255,255,0.6)' }}>Just now</div>
                </div>
                <button onClick={onClose} style={{ marginLeft: 'auto', background: 'none', border: 'none', color: 'white', fontSize: '1.5rem', cursor: 'pointer' }}>✕</button>
              </div>

              {/* Main content */}
              <div style={{ fontSize: '5rem' }}>{item.emoji}</div>

              {/* Caption */}
              <div className="story-caption">
                <div className="story-caption-text">{item.caption}</div>
                {item.cta && (
                  <button className="story-cta-btn" onClick={() => { onClose(); window.location.hash = item.ctaHash; }}>
                    {item.cta} →
                  </button>
                )}
              </div>
            </div>

            {/* Navigation */}
            {storyIndex > 0 && <button className="story-nav prev" onClick={onPrev}>‹</button>}
            <button className="story-nav next" onClick={onNext}>›</button>
          </div>
        </div>
      );
    }

    function MessagesPage({ conversationId }) {
      const auth = useContext(AuthContext);
      const [conversations, setConversations] = useState([]);
      const [messages, setMessages] = useState([]);
      const [selectedConvId, setSelectedConvId] = useState(conversationId);
      const [newMessage, setNewMessage] = useState('');
      const [loading, setLoading] = useState(true);
      const messageEndRef = useRef(null);

      const scrollToBottom = () => {
        messageEndRef.current?.scrollIntoView({ behavior: 'smooth' });
      };

      useEffect(() => {
        scrollToBottom();
      }, [messages]);

      useEffect(() => {
        const fetchConversations = async () => {
          try {
            const { data, error } = await supabase
              .from('conversations')
              .select('*')
              .or(`participant_1.eq.${auth.currentUser.id},participant_2.eq.${auth.currentUser.id}`)
              .order('last_message_at', { ascending: false });

            if (error) throw error;
            setConversations(data || []);
          } catch (error) {
            console.error('Fetch conversations error:', error);
          } finally {
            setLoading(false);
          }
        };

        if (auth.currentUser) {
          fetchConversations();
        }
      }, [auth.currentUser]);

      useEffect(() => {
        const fetchMessages = async () => {
          if (!selectedConvId) return;

          try {
            const { data, error } = await supabase
              .from('messages')
              .select('*')
              .eq('conversation_id', selectedConvId)
              .order('created_at', { ascending: true });

            if (error) throw error;
            setMessages(data || []);
          } catch (error) {
            console.error('Fetch messages error:', error);
          }
        };

        fetchMessages();

        // Subscribe to realtime messages
        const subscription = supabase
          .channel(`messages:${selectedConvId}`)
          .on(
            'postgres_changes',
            {
              event: 'INSERT',
              schema: 'public',
              table: 'messages',
              filter: `conversation_id=eq.${selectedConvId}`,
            },
            (payload) => {
              setMessages(prev => [...prev, payload.new]);
            }
          )
          .subscribe();

        return () => {
          subscription.unsubscribe();
        };
      }, [selectedConvId]);

      const handleSendMessage = async () => {
        if (newMessage.trim() && selectedConvId) {
          const success = await auth.sendMessage(selectedConvId, newMessage);
          if (success) {
            setNewMessage('');
            // Update conversation's last_message_at
            await supabase
              .from('conversations')
              .update({
                last_message_at: new Date().toISOString(),
                last_message_preview: newMessage.substring(0, 50),
              })
              .eq('id', selectedConvId);
          }
        }
      };

      if (loading) {
        return <div className="text-center" style={{ padding: '2rem' }}>Loading messages...</div>;
      }

      if (conversations.length === 0) {
        return (
          <div>
            <h2 style={{ marginBottom: '1.5rem' }}>Messages</h2>
            <div className="empty-state">
              <div className="empty-state-icon">💬</div>
              <div className="empty-state-title">No conversations yet</div>
              <div className="empty-state-text">Browse models and start messaging</div>
            </div>
          </div>
        );
      }

      const currentConversation = conversations.find(c => c.id === selectedConvId);

      if (!currentConversation) {
        return (
          <div>
            <h2 style={{ marginBottom: '1.5rem' }}>Messages</h2>
            <div className="empty-state">
              <div className="empty-state-icon">💬</div>
              <div className="empty-state-title">Select a conversation</div>
            </div>
          </div>
        );
      }

      return (
        <div>
          <h2 style={{ marginBottom: '1.5rem' }}>Messages</h2>
          <div className="messages-container">
            <div className="conversations-list">
              <div className="conversations-list-header">Conversations</div>
              <div className="conversations-list-scroll">
                {conversations.map(conv => (
                  <div
                    key={conv.id}
                    className={`conversation-item ${selectedConvId === conv.id ? 'active' : ''}`}
                    onClick={() => setSelectedConvId(conv.id)}
                  >
                    <div className="conversation-name">
                      {conv.participant_1 === auth.currentUser.id ? 'Model' : 'Client'}
                    </div>
                    <div className="conversation-preview">{conv.last_message_preview || 'No messages yet'}</div>
                  </div>
                ))}
              </div>
            </div>

            <div className="message-thread">
              <div className="message-thread-header">Conversation</div>
              <div className="message-thread-scroll">
                {messages.length === 0 ? (
                  <div className="empty-state">
                    <div className="empty-state-icon">👋</div>
                    <div className="empty-state-title">No messages yet</div>
                    <div className="empty-state-text">Start the conversation!</div>
                  </div>
                ) : (
                  <>
                    {messages.map(msg => (
                      <div key={msg.id} className={`message-bubble ${msg.sender_id === auth.currentUser.id ? 'sent' : 'received'}`}>
                        <div className="message-content">{msg.content}</div>
                        <div className="message-time">
                          {new Date(msg.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}
                        </div>
                      </div>
                    ))}
                    <div ref={messageEndRef} />
                  </>
                )}
              </div>
              <div className="message-input-section">
                <input
                  type="text"
                  placeholder="Type your message..."
                  value={newMessage}
                  onChange={(e) => setNewMessage(e.target.value)}
                  onKeyPress={(e) => e.key === 'Enter' && handleSendMessage()}
                />
                <button onClick={handleSendMessage}>Send</button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function DashboardPage() {

      const [bookings, setBookings] = useState([]);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        const fetchBookings = async () => {
          try {
            let query = supabase.from('bookings').select('*');

            if (auth.profile?.role === 'model') {
              query = query.eq('model_id', auth.currentUser.id);
            } else {
              query = query.eq('client_id', auth.currentUser.id);
            }

            const { data, error } = await query.order('created_at', { ascending: false });

            if (error) throw error;
            setBookings(data || []);
          } catch (error) {
            console.error('Fetch bookings error:', error);
          } finally {
            setLoading(false);
          }
        };

        if (auth.currentUser && auth.profile) {
          fetchBookings();
        }

        return <div className="text-center" style={{ padding: '2rem' }}>Loading dashboard...</div>;

              <div className="card" style={{ marginBottom: '2rem', border: '2px solid var(--accent-pink)', background: 'linear-gradient(135deg, rgba(255, 110, 199, 0.1), rgba(157, 78, 221, 0.1))' }}>
                <h3 style={{ marginBottom: '0.5rem', color: 'var(--accent-pink)' }}>Upgrade to Premium</h3>
                <p style={{ color: 'var(--text-secondary)', marginBottom: '1rem' }}>
                  Send messages to models, receive responses, and secure bookings with premium features.
                </p>
                <button className="btn glow-btn" onClick={() => auth.upgradeToPremium()}>Upgrade - $9.99/month</button>
              </div>
            )}

            <h3 style={{ marginBottom: '1rem' }}>Your Bookings</h3>
            <div className="grid">
              {bookings.map(booking => (
                <div key={booking.id} className="card">
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'start', marginBottom: '1rem' }}>
                    <div>
                      <div style={{ fontWeight: '700' }}>Model</div>
                      <div style={{ color: 'var(--text-secondary)', fontSize: '0.9rem' }}>{booking.session_date} • {booking.duration_hours}h</div>
                    </div>
                    <div className={`badge ${booking.status === 'pending' ? 'badge-pending' : booking.status === 'accepted' ? 'badge-success' : 'badge-warning'}`}>
                      {booking.status.charAt(0).toUpperCase() + booking.status.slice(1)}
                    </div>
                  </div>
                  <div style={{ color: 'var(--text-secondary)', fontSize: '0.9rem' }}>
                    <strong>Rate:</strong> ${booking.rate}
                  </div>
                </div>
              ))}
              {bookings.length === 0 && (
                <div className="empty-state">
                  <div className="empty-state-icon">📅</div>
                  <div className="empty-state-title">No bookings yet</div>
                  <div className="empty-state-text">Browse models and book your first session</div>
                </div>
              )}
            </div>
          </div>
        );
      }
    }

    function ForModelsPage() {
      return (
        <div>
          <h2 style={{ marginBottom: '2rem' }}>Join as a Model</h2>

          <div className="grid grid-2" style={{ marginBottom: '3rem' }}>
            <div className="card">
              <div style={{ fontSize: '2rem', marginBottom: '1rem' }}>💰</div>
              <h3 style={{ marginBottom: '0.5rem' }}>Earn on Your Terms</h3>
              <p style={{ color: 'var(--text-secondary)' }}>Set your own rates and availability. Keep 100% of what you earn after the platform fee.</p>
            </div>
            <div className="card">
              <div style={{ fontSize: '2rem', marginBottom: '1rem' }}>🛡️</div>
              <h3 style={{ marginBottom: '0.5rem' }}>Safe & Secure</h3>
              <p style={{ color: 'var(--text-secondary)' }}>All models are verified. Contract options and client reviews keep everyone accountable.</p>
            </div>
            <div className="card">
              <div style={{ fontSize: '2rem', marginBottom: '1rem' }}>📱</div>
              <h3 style={{ marginBottom: '0.5rem' }}>Direct Client Access</h3>
              <p style={{ color: 'var(--text-secondary)' }}>Message clients directly, negotiate sessions, and build your reputation on the platform.</p>
            </div>
            <div className="card">
              <div style={{ fontSize: '2rem', marginBottom: '1rem' }}>🔗</div>
              <h3 style={{ marginBottom: '0.5rem' }}>Referral Program</h3>
              <p style={{ color: 'var(--text-secondary)' }}>Get a referral link. Share it on social media—waive the $29/mo fee when someone signs up!</p>
            </div>
          </div>

          <div className="card" style={{ background: 'linear-gradient(135deg, rgba(255, 110, 199, 0.15), rgba(0, 217, 255, 0.15))', border: '2px solid var(--accent-pink)', marginBottom: '2rem' }}>
            <h3 style={{ marginBottom: '1rem' }}>$29/month</h3>
            <p style={{ color: 'var(--text-secondary)', marginBottom: '1.5rem' }}>Model membership • Unlimited bookings • Direct messaging • Professional tools</p>
            <button className="btn glow-btn" onClick={() => window.location.hash = 'signup'}>Apply as Model</button>
          </div>
        </div>
      );
    }

    function ContractsPage() {
      return (
        <div>
          <h2 style={{ marginBottom: '2rem' }}>Photo Session Contracts</h2>
          <p style={{ color: 'var(--text-secondary)', marginBottom: '2rem' }}>
            Choose the contract that fits your comfort level. Models review and agree before any session.
          </p>

          <div className="grid grid-3">
            <div className="card">
              <h3 style={{ marginBottom: '1rem', color: 'var(--accent-pink)' }}>Standard</h3>
              <div style={{ color: 'var(--accent-gold)', fontWeight: '700', marginBottom: '1rem' }}>Personal Use</div>
              <ul style={{ color: 'var(--text-secondary)', marginBottom: '1.5rem', lineHeight: '2' }}>
                <li>✓ Photos for personal portfolio</li>
                <li>✓ Social media (credit model)</li>
                <li>✗ Commercial licensing</li>
                <li>✗ Brand sponsorships</li>
              </ul>
              <button className="btn glow-btn btn-block">Download PDF</button>
            </div>

            <div className="card" style={{ border: '2px solid var(--accent-gold)' }}>
              <h3 style={{ marginBottom: '1rem', color: 'var(--accent-gold)' }}>Full Rights</h3>
              <div style={{ color: 'var(--accent-gold)', fontWeight: '700', marginBottom: '1rem' }}>Commercial License</div>
              <ul style={{ color: 'var(--text-secondary)', marginBottom: '1.5rem', lineHeight: '2' }}>
                <li>✓ Commercial use</li>
                <li>✓ Magazine publication</li>
                <li>✓ Advertising campaigns</li>
                <li>✓ No ongoing royalties</li>
              </ul>
              <button className="btn glow-btn btn-block">Download PDF</button>
            </div>

            <div className="card">
              <h3 style={{ marginBottom: '1rem', color: 'var(--accent-purple)' }}>Limited</h3>
              <div style={{ color: 'var(--accent-purple)', fontWeight: '700', marginBottom: '1rem' }}>Restricted Commercial</div>
              <ul style={{ color: 'var(--text-secondary)', marginBottom: '1.5rem', lineHeight: '2' }}>
                <li>✓ Limited commercial use</li>
                <li>✓ Specific purpose only</li>
                <li>✓ Model approval required</li>
                <li>✗ Resale prohibited</li>
              </ul>
              <button className="btn glow-btn btn-block">Download PDF</button>
            </div>
          </div>

          <div className="card" style={{ marginTop: '2rem', background: 'rgba(0, 217, 163, 0.1)', border: '1px solid var(--success-green)' }}>
            <div style={{ display: 'flex', gap: '1rem', alignItems: 'start' }}>
              <div style={{ fontSize: '1.5rem' }}>✓</div>
              <div>
                <strong style={{ color: 'var(--success-green)' }}>Model-Controlled</strong>
                <p style={{ color: 'var(--text-secondary)', marginTop: '0.5rem' }}>
                  Models choose which contract to use and can decline specific requests. Your comfort and rights come first.
                </p>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function LoginPage() {
      const { login } = useContext(AuthContext);
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [error, setError] = useState('');
      const [loading, setLoading] = useState(false);

      const handleLogin = async () => {
        setError('');
        setLoading(true);
        const success = await login(email, password);
        setLoading(false);
        if (success) {
          window.location.hash = 'dashboard';
        }
      };

      return (
        <div style={{ maxWidth: '400px', margin: '3rem auto' }}>
          <div className="card">
            <h2 style={{ marginBottom: '1.5rem' }}>Login</h2>

            <div className="form-group">
              <label>Email</label>
              <input
                type="email"
                value={email}
                onChange={(e) => setEmail(e.target.value)}
                placeholder="your@email.com"
              />
            </div>

            <div className="form-group">
              <label>Password</label>
              <input
                type="password"
                value={password}
                onChange={(e) => setPassword(e.target.value)}
                placeholder="••••••••"
                onKeyPress={(e) => e.key === 'Enter' && handleLogin()}
              />
            </div>

            {error && <div className="form-error">{error}</div>}

            <button className="btn glow-btn btn-block" onClick={handleLogin} disabled={loading} style={{ marginBottom: '1rem', opacity: loading ? 0.6 : 1 }}>
              {loading ? 'Logging in...' : 'Login'}
            </button>

            <p style={{ textAlign: 'center', color: 'var(--text-secondary)', marginBottom: '1.5rem' }}>
              Don't have an account? <a onClick={() => window.location.hash = 'signup'}>Sign up</a>
            </p>
          </div>
        </div>
      );
    }

    function SignupPage() {
      const { signup } = useContext(AuthContext);
      const [displayName, setDisplayName] = useState('');
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [role, setRole] = useState('client');
      const [error, setError] = useState('');
      const [loading, setLoading] = useState(false);

      const handleSignup = async () => {
        setError('');
        if (!displayName || !email || !password) {
          setError('Please fill in all fields');
          return;
        }
        setLoading(true);
        const success = await signup(displayName, email, password, role);
        setLoading(false);
        if (success) {
          window.location.hash = 'login';
        }
      };

      return (
        <div style={{ maxWidth: '400px', margin: '3rem auto' }}>
          <div className="card">
            <h2 style={{ marginBottom: '1.5rem' }}>Create Account</h2>

            <div className="form-group">
              <label>I am a...</label>
              <div style={{ display: 'flex', gap: '1rem' }}>
                <label style={{ display: 'flex', alignItems: 'center', gap: '0.5rem', cursor: 'pointer' }}>
                  <input
                    type="radio"
                    value="client"
                    checked={role === 'client'}
                    onChange={(e) => setRole(e.target.value)}
                  />
                  Client
                </label>
                <label style={{ display: 'flex', alignItems: 'center', gap: '0.5rem', cursor: 'pointer' }}>
                  <input
                    type="radio"
                    value="model"
                    checked={role === 'model'}
                    onChange={(e) => setRole(e.target.value)}
                  />
                  Model ($29/mo)
                </label>
              </div>
            </div>

            <div className="form-group">
              <label>Full Name</label>
              <input
                type="text"
                value={displayName}
                onChange={(e) => setDisplayName(e.target.value)}
                placeholder="Your name"
              />
            </div>

            <div className="form-group">
              <label>Email</label>
              <input
                type="email"
                value={email}
                onChange={(e) => setEmail(e.target.value)}
                placeholder="your@email.com"
              />
            </div>

            <div className="form-group">
              <label>Password</label>
              <input
                type="password"
                value={password}
                onChange={(e) => setPassword(e.target.value)}
                placeholder="••••••••"
                onKeyPress={(e) => e.key === 'Enter' && handleSignup()}
              />
            </div>

            {error && <div className="form-error">{error}</div>}

            <button className="btn glow-btn btn-block" onClick={handleSignup} disabled={loading} style={{ marginBottom: '1rem', opacity: loading ? 0.6 : 1 }}>
              {loading ? 'Creating account...' : 'Create Account'}
            </button>

            <p style={{ textAlign: 'center', color: 'var(--text-secondary)' }}>
              Already have an account? <a onClick={() => window.location.hash = 'login'}>Login</a>
            </p>
          </div>
        </div>
      );
    }

    function EditProfilePage() {
      const { currentUser, profile, updateProfile } = useContext(AuthContext);
      const [data, setData] = useState(profile || {});
      const [loading, setLoading] = useState(false);

      if (!profile) {
        return <div>Loading...</div>;
      }

      const handleSave = async () => {
        setLoading(true);
        const success = await updateProfile(data);
        setLoading(false);
        if (success) {
          window.location.hash = `profile/${currentUser.id}`;
        }
      };

      const isModel = profile.role === 'model';

      return (
        <div style={{ maxWidth: '600px', margin: '2rem auto' }}>
          <button className="btn btn-secondary" onClick={() => window.location.hash = 'dashboard'} style={{ marginBottom: '2rem' }}>← Back</button>

          <div className="card">
            <h2 style={{ marginBottom: '1.5rem' }}>Edit Profile</h2>

            <div className="form-group">
              <label>Name</label>
              <input
                type="text"
                value={data.display_name || ''}
                onChange={(e) => setData({ ...data, display_name: e.target.value })}
              />
            </div>

            <div className="form-group">
              <label>Bio</label>
              <textarea
                value={data.bio || ''}
                onChange={(e) => setData({ ...data, bio: e.target.value })}
              />
            </div>

            {isModel && (
              <>
                <div className="form-group">
                  <label>Rate per Session</label>
                  <input
                    type="number"
                    value={data.rate || 0}
                    onChange={(e) => setData({ ...data, rate: parseInt(e.target.value) })}
                  />
                </div>

                <div className="form-group">
                  <label>Tags (comma separated)</label>
                  <input
                    type="text"
                    value={(data.tags && data.tags.join(', ')) || ''}
                    onChange={(e) => setData({ ...data, tags: e.target.value.split(',').map(t => t.trim()) })}
                    placeholder="Lingerie, Glamour, Costume..."
                  />
                </div>

                <div className="form-group">
                  <label>Availability</label>
                  <input
                    type="text"
                    value={data.availability || 'Flexible'}
                    onChange={(e) => setData({ ...data, availability: e.target.value })}
                    placeholder="e.g., Mon-Fri, Weekends"
                  />
                </div>
              </>
            )}

            <div style={{ display: 'flex', gap: '1rem' }}>
              <button className="btn glow-btn" onClick={handleSave} disabled={loading} style={{ opacity: loading ? 0.6 : 1 }}>
                {loading ? 'Saving...' : 'Save Changes'}
              </button>
              <button className="btn btn-secondary" onClick={() => window.location.hash = 'dashboard'}>Cancel</button>
            </div>
          </div>
        </div>
      );
    }

    // ===== MAIN APP COMPONENT =====
    function App() {
      const auth = useContext(AuthContext);
      const [currentPage, setCurrentPage] = useState('home');

      useEffect(() => {
        const handleHashChange = () => {
          const hash = window.location.hash.slice(1) || 'home';
          setCurrentPage(hash);
        };
        window.addEventListener('hashchange', handleHashChange);
        handleHashChange();
        return () => window.removeEventListener('hashchange', handleHashChange);
      }, []);

      if (auth.loading) {
        return (
          <div className="app-container">
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', minHeight: '100vh' }}>
              <div className="loading-spinner"></div>
            </div>
          </div>
        );
      }

      const renderPage = () => {
        const [page, ...params] = currentPage.split('/');

        if (page === 'home') return !auth.currentUser ? <HomePage /> : <FeedPage />;
        if (page === 'feed') return <FeedPage />;
        if (page === 'wall') return <TopClientsPage />;
        if (page === 'circle' && params[0]) return <InnerCirclePage modelId={params[0]} />;
        if (page === 'browse') return <BrowseModelsPage />;
        if (page === 'profile' && params[0]) return <ProfilePage modelId={params[0]} />;
        if (page === 'client' && params[0]) return <ClientProfilePage clientId={params[0]} />;
        if (page === 'formodels') return <ForModelsPage />;
        if (page === 'contracts') return <ContractsPage />;
        if (page === 'login') return <LoginPage />;
        if (page === 'signup') return <SignupPage />;
        if (page === 'dashboard') return auth.currentUser ? <DashboardPage /> : <LoginPage />;
        if (page === 'messages' && params[0]) return auth.currentUser ? <MessagesPage conversationId={params[0]} /> : <LoginPage />;
        if (page === 'messages') return auth.currentUser ? <MessagesPage conversationId={null} /> : <LoginPage />;
        if (page === 'edit-profile') return auth.currentUser ? <EditProfilePage /> : <LoginPage />;
        return !auth.currentUser ? <HomePage /> : <BrowseModelsPage />;
      };

      return (
        <div className="app-container">
          <nav className="nav">
            <div className="nav-brand" onClick={() => window.location.hash = 'home'}>🎀 ModelBid</div>

            <div className="nav-links">
              <a className="nav-link" onClick={() => window.location.hash = 'feed'}>Feed</a>
              <a className="nav-link" onClick={() => window.location.hash = 'browse'}>Browse</a>
              <a className="nav-link" onClick={() => window.location.hash = 'wall'}>🏆 The Wall</a>
              <a className="nav-link" onClick={() => window.location.hash = 'contracts'}>Contracts</a>
              <a className="nav-link" onClick={() => window.location.hash = 'formodels'}>For Models</a>
            </div>

            <div className="nav-links">
              {!auth.currentUser ? (
                <>
                  <button className="btn btn-secondary" onClick={() => window.location.hash = 'login'}>Login</button>
                  <button className="btn glow-btn" onClick={() => window.location.hash = 'signup'}>Sign Up</button>
                </>
              ) : (
                <div className="user-section">
                  <a className="nav-link" onClick={() => window.location.hash = 'messages'}>📬 Messages</a>
                  <a className="nav-link" onClick={() => window.location.hash = 'dashboard'}>Dashboard</a>
                  <a className="nav-link" onClick={() => window.location.hash = 'edit-profile'}>⚙️ Profile</a>
                  <div className="user-info">
                    <div className="avatar">{auth.profile?.avatar_emoji || '👤'}</div>
                    <div className="user-name">{auth.profile?.display_name || 'User'}</div>
                  </div>
                  <button className="btn btn-secondary" onClick={async () => {
                    await auth.logout();
                    window.location.hash = 'home';
                  }}>Logout</button>
                </div>
              )}
            </div>
          </nav>

          <div className="main-content">
            {renderPage()}
          </div>
        </div>
      );
    }

    // ===== RENDER APP =====
    ReactDOM.createRoot(document.getElementById('root')).render(
      <AuthProvider>
        <App />
      </AuthProvider>
    );
  </script>
</body>
</html>
